  return `${onboarding.map(c=>{const step=c.onboardingStep||0;const pct=Math.round((step/OB_STEPS.length)*100);return `<div class="card" style="margin-bottom:14px"><div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:10px"><div class="av av-md ${avColor(c.assignedVaColor)}">${c.assignedVaInitials}</div><div><div style="font-size:14px;font-weight:600">${c.name}</div><div style="font-size:11px;color:var(--text3)">${c.package} · $${c.rateUsd}/mo · Partner: ${c.assignedVa}</div></div></div><div style="text-align:right"><div style="font-size:16px;font-weight:700;color:${pct>=100?'var(--green)':pct>=50?'var(--gold-dark)':'var(--navy)'}">${pct}%</div><div style="font-size:10px;color:var(--text3)">Step ${step} of ${OB_STEPS.length}</div></div></div><div style="padding:12px 16px"><div class="prog-lg" style="margin-bottom:12px"><div class="prog-fill" style="width:${pct}%;background:${pct>=100?'var(--green)':pct>=50?'var(--gold)':'var(--teal)'}"></div></div>${OB_STEPS.map((s,i)=>`<div class="ob-step"><div class="ob-step-icon ${i<step?'ob-done':'ob-pending'}">${i<step?'✓':i+1}</div><div class="ob-step-name${i<step?' done':''}">${s}</div>${i<step?`<span class="tag t-green" style="font-size:9px">Done</span>`:i===step?`<button class="btn btn-xs btn-teal" onclick="markOnboardingStep('${c.id}',${step+1})">Mark Done</button>`:`<span class="tag t-gray" style="font-size:9px">Pending</span>`}</div>`).join('')}</div></div>`;}).join('') || emptyState('No clients currently onboarding.')}`;
}

async function markOnboardingStep(clientId, newStep){
  const done = newStep >= OB_STEPS.length;
  await updateDoc('clients', clientId, { onboardingStep:newStep, onboardingDone:done, status:done?'Active':undefined, _actAction:'updated onboarding step', _actIcon:'📋', _actColor:'teal', _actRecord:APP.data.clients.find(c=>c.id===clientId)?.name || clientId });
  toast(done?'Client fully onboarded! Status changed to Active.':'Step marked complete!','success');
}

/* VA: profile photo upload */
function uploadVAPhoto(vaId){
  const input = document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.onchange=function(e){
    const file=e.target.files[0]; if(!file) return;
    if(file.size>2*1024*1024){ toast('Image must be under 2MB.','error'); return; }
    const r=new FileReader();
    r.onload=function(ev){ localStorage.setItem('tjc-photo-'+vaId,ev.target.result); renderCurrentPage(); toast('Profile photo updated! 📷','success'); };
    r.readAsDataURL(file);
  };
  input.click();
}

function saveVAPIN(vaId){
  const va = APP.data.team.find(v=>v.id===vaId);
  const oldVal = document.getElementById('va-old-pin').value;
  const newVal = document.getElementById('va-new-pin').value;
  const confirmVal = document.getElementById('va-confirm-pin').value;
  if(oldVal !== (va.pin||'1234')){ toast('Current PIN is incorrect.','error'); return; }
  if(!/^\d{4}$/.test(newVal)){ toast('New PIN must be exactly 4 digits.','error'); return; }
  if(newVal !== confirmVal){ toast('PINs do not match.','error'); return; }
  va.pin = newVal;
  lsSave('team', APP.data.team);
  document.getElementById('va-old-pin').value='';
  document.getElementById('va-new-pin').value='';
  document.getElementById('va-confirm-pin').value='';
  toast('PIN updated successfully! 🔒','success');
}

function sendVAMessage(vaId, thread){
  const input = document.getElementById('va-msg-input');
  if(!input||!input.value.trim()){ toast('Please type a message.','error'); return; }
  const text = input.value.trim();
  const convId = thread==='management' ? 'va-'+vaId : thread;
  const convType = thread==='management' ? 'management' : 'client-partner';
  const conv = getOrCreateClientConv(convId, convType);
  const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  conv.messages = conv.messages||[];
  conv.messages.push({from:'va', text, time, date:'Today'});
  conv.preview=text; conv.date='Today'; conv.unread=(conv.unread||0)+1;
  lsSave('conversations', APP.data.conversations);
  APP.va.msgThread=thread;
  setVATab('messages');
  setTimeout(()=>{const el=document.getElementById('va-chat-area'); if(el) el.scrollTop=el.scrollHeight;},50);
  toast('Message sent!','success');
}

function getWeekStart(){ const d=new Date(); d.setDate(d.getDate()-d.getDay()); return d.toISOString().split('T')[0]; }

function renderVATabTimelog(va, myLogs, td, todayMins){
  const elapsed = APP.timer.elapsed;
  const weekMins = myLogs.filter(l=>l.date>=getWeekStart()).reduce((a,l)=>a+(l.minutes||0),0);
  const onBreak = !!(APP.timer.running && APP.timer.breakUntil && Date.now() < APP.timer.breakUntil);
  const breakRemaining = onBreak ? Math.max(0, Math.floor((APP.timer.breakUntil - Date.now())/1000)) : 0;
  const bm = String(Math.floor(breakRemaining/60)).padStart(2,'0');
  const bs = String(breakRemaining%60).padStart(2,'0');

  // Build timer buttons cleanly
  let timerBtns = '';
  if(!APP.timer.running){
    timerBtns = `<button class="timer-btn-start" onclick="startTimer()">▶ Start Timer</button>`;
  } else if(onBreak){
    timerBtns = `<button class="timer-btn-start" onclick="endBreakEarly()">▶ Resume</button><button class="timer-btn-stop" onclick="stopTimer()">⏹ Stop</button>`;
  } else {
    timerBtns = `<button class="timer-btn-stop" onclick="stopTimer()">⏹ Stop &amp; Log</button><button style="background:var(--amber-pale);color:var(--amber);border:1px solid rgba(99,56,6,.2);padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)" onclick="startBreak()">☕ 1h Break</button>`;
  }
  timerBtns += `<button class="timer-btn-reset" onclick="resetTimer()">↺ Reset</button>`;

  return `

        </div>
        <div id="${credId}" style="display:none;margin-top:8px">
          ${tools.length===0?`<div style="font-size:12px;color:var(--text3)">No credentials stored for this client yet.</div>`:''}
          ${tools.map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:16px">${t.emoji||'🔧'}</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:600">${t.name}</div>
              <div style="font-size:11px;color:var(--text3)">${t.username||'No username set'}${t.note?' · '+t.note:''}</div>
            </div>
            <span class="tag ${t.hasAccess?'t-green':'t-red'}" style="font-size:10px">${t.hasAccess?'✓ Access':'No Access'}</span>
          </div>`).join('')}
        </div>
      </div>
      ${clientConvs.length>0?`<div style="padding:10px 16px;border-top:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">💬 Messages from Client</div>
        ${clientConvs.map(cv=>{
          const lastMsg = (cv.messages||[]).filter(m=>m.from==='client').slice(-1)[0];
          return lastMsg?`<div style="background:var(--bg);border-radius:var(--r);padding:8px 10px;font-size:12px;color:var(--text2);margin-bottom:6px">
            <div style="font-weight:600;color:var(--text);margin-bottom:2px">${cv.type==='client-management'?'To Management':'To Partner'}</div>
            <div>${lastMsg.text}</div>

      </div>`:''}
    </div>`;
  }).join('') || emptyState('No active clients assigned.')}`;

function toggleVACredentials(id){
  const el = document.getElementById(id);
  const arr = document.getElementById(id+'-arr');
  if(!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if(arr) arr.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
}

  openModal('Set Google Drive Link',
    `<div class="form-hint">Paste the Google Drive URL for <strong>${sop.title}</strong>. Once set, an "Open SOP" button will appear for your Partners.</div>

function saveSOPDriveUrl(sopId){

  openModal('Add SOP',

async function saveAddSOP(){
  const title = document.getElementById('f-sop-title').value.trim();
  const steps = document.getElementById('f-sop-steps').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!title||!steps.length){ toast('Title and at least one step are required.','error'); return; }
  const sop = {
    id: 'sop'+Date.now(),
    emoji: document.getElementById('f-sop-emoji').value.trim()||'📋',
    title,
    driveUrl: document.getElementById('f-sop-url2').value.trim(),
    steps
  };
  APP.data.sops.push(sop);
  lsSave('sops', APP.data.sops);
  closeModal();
  renderCurrentPage();
  toast('SOP added!');
}

  const c = APP.data.clients.find(x=>x.id===clientId);

  const metrics = {
    period: document.getElementById('mkt-period').value.trim(),

  await updateDoc('clients', clientId, {marketingMetrics: metrics, _actAction:'updated marketing metrics', _actIcon:'📊', _actColor:'teal', _actRecord:c.name});
  toast('Marketing metrics saved!', 'success');

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }

let toastTimer;
function toast(msg, type='success'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 3500);
}

function toggleSOP(i){

}

async function fetchLiveExchangeRate(){
  try{
    const el=document.getElementById('sb-fx-val');
    if(el) el.textContent='$1 = ₱ …';
    const res=await fetch('https://api.frankfurter.app/latest?from=USD&to=PHP');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    const rate=data.rates&&data.rates.PHP;
    if(!rate) throw new Error('No PHP rate');
    CFG.exchangeRate=parseFloat(rate.toFixed(2));
    saveConfig();
    updateExchangeRateDisplay();
    if(el) el.style.color='#4ade80';
    setTimeout(()=>{ if(el) el.style.color=''; },1500);
    toast('Exchange rate updated: $1 = ₱'+CFG.exchangeRate.toFixed(2),'success');
  }catch(err){
    toast('Could not fetch live rate. Using saved rate.','warning');
    updateExchangeRateDisplay();
  }
}

}

function updatePostPreview(){
  const caption = (document.getElementById('f-ct-title')||{}).value || '';
  const imgUrl = drivePreviewUrl((document.getElementById('f-ct-image')||{}).value || '');
  const checked = [...document.querySelectorAll('.f-ct-plat:checked')].map(x=>x.value);
  const prev = document.getElementById('post-live-preview');
  if(!prev) return;
  const imgArea = prev.querySelector('.sp-preview-img,.sp-preview-img-ph');
  if(imgArea && imgUrl){
    imgArea.outerHTML = `<img class="sp-preview-img" src="${imgUrl}" onerror="this.outerHTML='<div class=sp-preview-img-ph>🖼 Could not load image — check the URL</div>'" alt="preview">`;
  } else if(imgArea && !imgUrl){
    if(imgArea.tagName==='IMG') imgArea.outerHTML = `<div class="sp-preview-img-ph">🖼 Add an image URL above to preview</div>`;
  }
  const cap = document.getElementById('preview-caption');
  if(cap){ cap.textContent = caption || 'Your caption will appear here…'; cap.style.fontStyle = caption?'normal':'italic'; cap.style.color = caption?'var(--text)':'var(--text3)'; }
  const platsEl = document.getElementById('preview-plats');
  if(platsEl) platsEl.innerHTML = checked.length ? checked.map(p=>`<span style="font-size:14px" title="${p}">${platIcon(p)}</span>`).join('') + `<span style="font-size:11px;color:var(--text3);margin-left:4px">${checked.join(' · ')}</span>` : `<span style="font-size:11px;color:var(--text3)">No platforms selected</span>`;
}

function fmtElapsed(secs){
  const h=String(Math.floor(secs/3600)).padStart(2,'0');
  const m=String(Math.floor((secs%3600)/60)).padStart(2,'0');
  const s=String(secs%60).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

function updateFloatingTimer(){
  const pill = document.getElementById('floating-timer');
  if(!pill) return;
  const show = APP.authMode==='va' && APP.timer.running && APP.va.tab !== 'timelog';
  pill.style.display = show ? 'flex' : 'none';
  if(show){
    const disp = document.getElementById('floating-timer-display');
    if(disp) disp.textContent = fmtElapsed(APP.timer.elapsed);
  }
}

function startTimer(){
  if(APP.timer.running) return;
  // Clear any break state
  APP.timer.breakUntil = null;
  clearInterval(APP.timer.breakIv);
  APP.timer.breakIv = null;
  APP.timer.running=true;
  APP.timer.start=Date.now()-APP.timer.elapsed*1000;
  APP.timer.iv=setInterval(()=>{
    // Check break state
    if(APP.timer.breakUntil){
      if(Date.now() >= APP.timer.breakUntil){
        // Auto-resume after break
        APP.timer.breakUntil = null;
        APP.timer.start = Date.now() - APP.timer.elapsed*1000;
        toast('Break time over — timer resumed!','info');
        renderCurrentPage();
      }
      updateBreakBanner();
      updateFloatingTimer();
      return;
    }
    APP.timer.elapsed=Math.floor((Date.now()-APP.timer.start)/1000);
    const el=document.getElementById('timer-display');
    if(el) el.textContent=fmtElapsed(APP.timer.elapsed);
    updateFloatingTimer();
  },1000);
  const btn=document.querySelector('.timer-btn-start');
  if(btn){
    btn.className='timer-btn-stop';
    btn.textContent='⏹ Stop & Log';
    btn.setAttribute('onclick','stopTimer()');
  }
  updateFloatingTimer();
}

function stopTimer(){
  clearInterval(APP.timer.iv);
  APP.timer.iv=null;
  APP.timer.running=false;
  APP.timer.breakUntil=null;
  clearInterval(APP.timer.breakIv);
  APP.timer.breakIv=null;
  updateFloatingTimer();
  toast('Timer stopped. Log your entry below.','info');
  renderCurrentPage();
}

function resetTimer(){
  clearInterval(APP.timer.iv);
  APP.timer.iv=null;
  APP.timer.running=false;
  APP.timer.elapsed=0;
  APP.timer.breakUntil=null;
  clearInterval(APP.timer.breakIv);
  APP.timer.breakIv=null;
  updateFloatingTimer();
  renderCurrentPage();
}

function startBreak(){
  if(!APP.timer.running){ toast('Start the timer first.','error'); return; }
  APP.timer.breakUntil = Date.now() + 3600000;
  // Pause: stop incrementing elapsed (timer.start won't advance during break)
  // We keep running=true so the interval checks, but elapsed won't change
  toast('☕ Break started — 1 hour. Timer paused.','info');
  renderCurrentPage();
}

function endBreakEarly(){
  if(!APP.timer.breakUntil) return;
  APP.timer.breakUntil = null;
  // Resume: reset start so elapsed continues from where it left off
  APP.timer.start = Date.now() - APP.timer.elapsed*1000;
  toast('Break ended — timer resumed!','info');
  renderCurrentPage();
}

function updateBreakBanner(){
  const banner = document.getElementById('break-banner');
  if(!banner || !APP.timer.breakUntil) return;
  const remaining = Math.max(0, Math.floor((APP.timer.breakUntil - Date.now())/1000));
  const bm = String(Math.floor(remaining/60)).padStart(2,'0');
  const bs = String(remaining%60).padStart(2,'0');
  const textEl = document.getElementById('break-countdown');
  if(textEl) textEl.textContent = `${bm}:${bs}`;
}

function dateOnly(value){
  if(!value) return '';
  if(typeof value === 'string' && value.length >= 10) return value.slice(0,10);
  return new Date(value).toISOString().slice(0,10);
}

function isoFromDate(value){
  if(!value) return ts();
  if(typeof value === 'string' && value.includes('T')) return value;
  return dateOnly(value) + 'T09:00:00Z';
}

function money(value){
  return '$' + Number(value || 0).toLocaleString();
}

function formatHours(value){
  if(!value) return '—';
  return value < 24 ? value.toFixed(1) + ' hrs' : (value / 24).toFixed(1) + ' days';
}

function daysSince(value){
  if(!value) return null;
  const diff = Date.now() - new Date(value).getTime();
  return Math.max(0, Math.floor(diff / 86400000));
}

function normalizeTaskRecord(task){
  const createdAt = task.createdAt || isoFromDate(task.createdDate);
  const status = task.status || (task.done ? 'done' : 'open');
  const done = status === 'done' || !!task.done;
  const completedDate = done ? (task.completedDate || dateOnly(task.updatedAt) || dateOnly(createdAt)) : null;
  return {
    ...task,
    description: task.description || '',
    status: done ? 'done' : 'open',
    done,
    createdAt,
    createdDate: task.createdDate || dateOnly(createdAt),
    completedDate,
    archived: !!task.archived
  };
}

function normalizePaymentRecord(payment){
  const createdAt = payment.createdAt || isoFromDate(payment.date);
  return {
    ...payment,
    amountUsd: Number(payment.amountUsd || 0),
    date: payment.date || dateOnly(createdAt),
    method: payment.method || 'Bank Transfer',
    note: payment.note || '',
    archived: !!payment.archived,
    createdAt
  };
}

function inferActivityMeta(col, record){
  if(col === 'tasks') return { clientId: record.clientId || null, taskId: record.id };
  if(col === 'payments') return { clientId: record.clientId || null, paymentId: record.id, invoiceId: record.invoiceId || null };
  if(col === 'invoices') return { clientId: record.clientId || null, invoiceId: record.id };
  return {};
}

function nid(col){
  const prefix = {tasks:'t',clients:'c',timelogs:'l',content:'x',invoices:'i',goals:'g',events:'e',team:'u',activities:'a',payments:'p'}[col] || 'd';
  return prefix + Date.now() + Math.floor(Math.random() * 1000);
}

async function updateDoc(col, id, data){

CFG.expectedTasksPerWeek = CFG.expectedTasksPerWeek || 10;

function clamp(value, min, max){
  return Math.min(max, Math.max(min, value));
}

function getTasksLastNDays(clientId, days){
  const cutoff = Date.now() - (days * 86400000);
  return TASK_ENGINE.forClient(clientId).filter(task => new Date(task.createdAt || isoFromDate(task.createdDate)).getTime() >= cutoff);
}

function getCompletedTasksLastNDays(clientId, days){
  const cutoff = Date.now() - (days * 86400000);
  return TASK_ENGINE.forClient(clientId).filter(task => {
    if(!task.done || !task.completedDate) return false;
    return new Date(isoFromDate(task.completedDate)).getTime() >= cutoff;
  });
}

function getPreviousPeriodTasks(clientId, days, completedOnly=false){
  const now = Date.now();
  const currentStart = now - (days * 86400000);
  const previousStart = now - (days * 2 * 86400000);
  return TASK_ENGINE.forClient(clientId).filter(task => {
    const stamp = completedOnly
      ? (task.done && task.completedDate ? new Date(isoFromDate(task.completedDate)).getTime() : null)
      : new Date(task.createdAt || isoFromDate(task.createdDate)).getTime();
    return stamp !== null && stamp >= previousStart && stamp < currentStart;
  });
}

function calculateUtilization(clientId){
  const tasksLast7Days = getTasksLastNDays(clientId, 7).length;
  const expectedTasksPerWeek = CFG.expectedTasksPerWeek || 10;
  const utilization = clamp(Math.round((tasksLast7Days / expectedTasksPerWeek) * 100), 0, 100);
  let label = 'Optimal Usage';
  if(utilization <= 30) label = 'Underutilized';
  else if(utilization <= 70) label = 'Moderate Usage';
  return { utilization, label, tasksLast7Days, expectedTasksPerWeek };
}

function calculateWeeklyChange(clientId){
  const thisWeek = getCompletedTasksLastNDays(clientId, 7).length;
  const lastWeek = getPreviousPeriodTasks(clientId, 7, true).length;
  let changePct = null;
  let summary = 'No baseline';
  if(lastWeek === 0 && thisWeek === 0){
    summary = 'No activity change';
  } else if(lastWeek === 0 && thisWeek > 0){
    summary = 'New activity this week';
  } else if(thisWeek === lastWeek){
    changePct = 0;
    summary = 'No activity change';
  } else {
    changePct = Math.round(((thisWeek - lastWeek) / lastWeek) * 100);
    summary = `${changePct > 0 ? '+' : ''}${changePct}% vs last week`;
  }
  return { thisWeek, lastWeek, changePct, summary };
}

function generateRecommendations(client){
  const tasks = TASK_ENGINE.forClient(client.id);
  const metrics = TASK_ENGINE.metrics(tasks);
  const { utilization, tasksLast7Days, expectedTasksPerWeek } = calculateUtilization(client.id);
  const outstanding = PAYMENT_ENGINE.outstandingForClient(client.id);
  const recommendations = [];
  if(utilization < 40){
    recommendations.push('Increase task assignments to maximize your Partner subscription.');
  }
  if(tasksLast7Days === 0){
    recommendations.push('No recent activity. Assign tasks to keep momentum.');
  }
  if(outstanding > 0){
    recommendations.push('You have an outstanding balance. Recording payment keeps reporting accurate.');
  }
  if(metrics.total > 0 && metrics.completionRate < 70){
    recommendations.push('Task completion rate is low. Review workload or task clarity.');
  }
  if(tasksLast7Days >= expectedTasksPerWeek){
    recommendations.push('Great utilization. Consider scaling or adding another Partner.');
  }
  return recommendations.slice(0, 3);
}

const TASK_ENGINE = {
  forClient(clientId){
    return (APP.data.tasks || []).filter(task => task.clientId === clientId && !task.archived).map(normalizeTaskRecord);
  },
  completionHours(task){
    if(!task.completedDate) return null;
    const start = new Date(task.createdAt || isoFromDate(task.createdDate)).getTime();
    const end = new Date(isoFromDate(task.completedDate)).getTime();
    return Math.max(0, (end - start) / 3600000);
  },
  metrics(tasks){
    const total = tasks.length;
    const completedList = tasks.filter(task => task.done);
    const completed = completedList.length;
    const completionRate = total ? Math.round((completed / total) * 100) : 0;
    const avgCompletionHours = completedList.length
      ? Math.round((completedList.reduce((sum, task) => sum + (this.completionHours(task) || 0), 0) / completedList.length) * 10) / 10
      : 0;
    const recentCreated = tasks.filter(task => {
      const days = daysSince(task.createdAt || task.createdDate);
      return days !== null && days <= 7;
    }).length;
    const recentCompleted = completedList.filter(task => {
      const days = daysSince(task.completedDate || task.updatedAt);
      return days !== null && days <= 7;
    }).length;
    return { total, completed, open: total - completed, completionRate, avgCompletionHours, recentCreated, recentCompleted };
  },
  latestActivityStamp(clientId){
    const taskStamps = this.forClient(clientId).flatMap(task => [task.createdAt, task.completedDate ? isoFromDate(task.completedDate) : null]).filter(Boolean);
    const paymentStamps = PAYMENT_ENGINE.forClient(clientId).map(payment => isoFromDate(payment.date));
    const latest = [...taskStamps, ...paymentStamps].sort().pop();
    return latest || null;
  },
  daysSinceClientActivity(clientId){
    const latest = this.latestActivityStamp(clientId);
    return latest ? daysSince(latest) : null;
  },
  activityScore(clientId){
    const days = this.daysSinceClientActivity(clientId);
    if(days === null) return 10;
    if(days <= 3) return 100;
    if(days <= 7) return 70;
    if(days <= 14) return 40;
    return 10;
  },
  isInactive(clientId){
    const days = this.daysSinceClientActivity(clientId);
    return days === null || days > 7;
  },
  timeline(clientId){
    return (APP.data.activities || [])
      .filter(entry => entry.clientId === clientId)
      .sort((a,b) => new Date(b.ts) - new Date(a.ts));
  }
};

const PAYMENT_ENGINE = {
  all(){
    return (APP.data.payments || []).filter(payment => !payment.archived).map(normalizePaymentRecord);
  },
  forClient(clientId){
    return this.all().filter(payment => payment.clientId === clientId);
  },
  forInvoice(invoiceId){
    return this.all().filter(payment => payment.invoiceId === invoiceId);
  },
  totalPaidForInvoice(invoiceId){
    return this.forInvoice(invoiceId).reduce((sum, payment) => sum + Number(payment.amountUsd || 0), 0);
  },
  totalPaidForClient(clientId){
    return this.forClient(clientId).reduce((sum, payment) => sum + Number(payment.amountUsd || 0), 0);
  },
  totalPaidOverall(){
    return this.all().reduce((sum, payment) => sum + Number(payment.amountUsd || 0), 0);
  },
  outstandingForInvoice(invoice){
    return Math.max(0, Number(invoice.amountUsd || 0) - this.totalPaidForInvoice(invoice.id));
  },
  outstandingForClient(clientId){
    const totalBilled = (APP.data.invoices || [])
      .filter(invoice => invoice.clientId === clientId && !invoice.archived)
      .reduce((sum, invoice) => sum + Number(invoice.amountUsd || 0), 0);
    return Math.max(0, totalBilled - this.totalPaidForClient(clientId));
  },
  outstandingOverall(){
    return (APP.data.invoices || [])
      .filter(invoice => !invoice.archived)
      .reduce((sum, invoice) => sum + this.outstandingForInvoice(invoice), 0);
  },
  latestDateForInvoice(invoiceId){
    return this.forInvoice(invoiceId).sort((a,b) => new Date(b.date) - new Date(a.date))[0]?.date || null;
  }
};

const INSIGHT_ENGINE = {
  buildClientSummary(client){
    const tasks = TASK_ENGINE.forClient(client.id);
    const slaRate = tasks.length ? SLA.complianceRate(tasks) : 0;
    const utilization = calculateUtilization(client.id);
    const weekly = calculateWeeklyChange(client.id);
    const recommendations = generateRecommendations(client);
    const leadRecommendation = recommendations[0] || 'Momentum looks healthy. Keep assigning clear, outcome-focused work to maintain value.';
    if(tasks.length === 0){
      return `No tasks have been assigned yet, so utilization is ${utilization.utilization}% (${utilization.label.toLowerCase()}). ${leadRecommendation}`;
    }
    const weeklyText = weekly.thisWeek === 1 ? '1 task' : `${weekly.thisWeek} tasks`;
    return `Your Partner completed ${weeklyText} this week (${weekly.summary}) with ${slaRate}% SLA compliance. Utilization is at ${utilization.utilization}% (${utilization.label.toLowerCase()}). ${leadRecommendation}`;
  },
  renderCard(client){
    return `<div class="card" style="margin-bottom:14px;border-left:3px solid var(--navy)"><div class="card-pad"><div style="font-size:10px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Insight Summary</div><div style="font-size:14px;line-height:1.6;color:var(--text)">${this.buildClientSummary(client)}</div></div></div>`;
  }
};

HEALTH.label = function(score){
  if(score >= 90) return 'Excellent';
  if(score >= 70) return 'Good';
  if(score >= 50) return 'Needs Attention';
  return 'At Risk';
};

HEALTH.color = function(score){
  if(score >= 90) return 'var(--green)';
  if(score >= 70) return 'var(--teal)';
  if(score >= 50) return 'var(--gold)';
  return 'var(--red)';
};

HEALTH.compute = function(client){
  if(!['Active','Onboarding','Completed'].includes(client.status)) return client.healthScore || 0;
  const tasks = TASK_ENGINE.forClient(client.id);
  const metrics = TASK_ENGINE.metrics(tasks);
  const completionRate = metrics.total ? metrics.completionRate : 0;
  const slaRate = tasks.length ? SLA.complianceRate(tasks) : 0;
  const { utilization } = calculateUtilization(client.id);
  const activityScore = TASK_ENGINE.activityScore(client.id);
  return clamp(Math.round((completionRate * 0.35) + (slaRate * 0.25) + (utilization * 0.25) + (activityScore * 0.15)), 0, 100);
};

HEALTH.risk = function(score){
  if(score >= 90) return 'low';
  if(score >= 70) return 'medium';
  if(score >= 50) return 'watch';
  return 'high';
};

HEALTH.riskTag = function(score){
  const label = this.label(score);
  const cls = score >= 90 ? 't-green' : score >= 70 ? 't-teal' : score >= 50 ? 't-amber' : 't-red';
  return `<span class="tag ${cls}">${label}</span>`;
};

function renderClientHealth(){
  const active = APP.data.clients.filter(c=>['Active','Onboarding'].includes(c.status)&&!c.archived);
  const scores = active.map(c=>({...c, computedHealth:HEALTH.compute(c)})).sort((a,b)=>a.computedHealth-b.computedHealth);
  const avgHealth = scores.length ? Math.round(scores.reduce((sum, client)=>sum+client.computedHealth,0)/scores.length) : 0;
  const excellent = scores.filter(c=>c.computedHealth>=90);
  const good = scores.filter(c=>c.computedHealth>=70&&c.computedHealth<90);
  const warning = scores.filter(c=>c.computedHealth>=50&&c.computedHealth<70);
  const atRisk = scores.filter(c=>c.computedHealth<50);
  return `<div class="kpi-grid"><div class="kpi-card" style="border-left-color:${HEALTH.color(avgHealth)}"><div class="kpi-label">Avg Health Score</div><div class="kpi-val" style="color:${HEALTH.color(avgHealth)}">${avgHealth}</div><div class="kpi-sub">Across ${active.length} active clients</div></div><div class="kpi-card" style="border-left-color:var(--green)"><div class="kpi-label">Excellent (90–100)</div><div class="kpi-val" style="color:var(--green)">${excellent.length}</div><div class="kpi-sub">${excellent.map(v=>v.name.split(' ')[0]).join(', ')||'—'}</div></div><div class="kpi-card" style="border-left-color:var(--teal)"><div class="kpi-label">Good (70–89)</div><div class="kpi-val" style="color:var(--teal)">${good.length}</div><div class="kpi-sub">${good.map(v=>v.name.split(' ')[0]).join(', ')||'—'}</div></div><div class="kpi-card" style="border-left-color:var(--gold)"><div class="kpi-label">Needs Attention</div><div class="kpi-val" style="color:var(--gold-dark)">${warning.length}</div><div class="kpi-sub">${warning.map(v=>v.name.split(' ')[0]).join(', ')||'—'}</div></div><div class="kpi-card" style="border-left-color:var(--red)"><div class="kpi-label">At Risk (&lt;50)</div><div class="kpi-val" style="color:${atRisk.length?'var(--red)':'var(--green)'}">${atRisk.length}</div><div class="kpi-sub">${atRisk.length?'Needs intervention':'None ✓'}</div></div></div>${atRisk.length>0?`<div class="cap-warning over" style="margin-bottom:14px">⚠ ${atRisk.map(c=>c.name).join(', ')} need immediate attention due to low completion, SLA, weak utilization, or recent inactivity.</div>`:''}${scores.map(c=>{const tasks=TASK_ENGINE.forClient(c.id);const metrics=TASK_ENGINE.metrics(tasks);const slaRate=tasks.length?SLA.complianceRate(tasks):0;const activityScore=TASK_ENGINE.activityScore(c.id);const utilization=calculateUtilization(c.id);return `<div class="card card-pad" style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:14px">${HEALTH.ring(c.computedHealth)}<div style="flex:1"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:14px;font-weight:600">${c.name}</span>${HEALTH.riskTag(c.computedHealth)}<span class="tag ${statusTag(c.status)}">${c.status}</span></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px"><div style="text-align:center;padding:6px;background:var(--bg);border-radius:var(--r)"><div style="font-size:13px;font-weight:700;color:${metrics.completionRate>=75?'var(--green)':metrics.completionRate>=50?'var(--gold-dark)':'var(--red)'}">${metrics.completionRate}%</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase">Completion</div></div><div style="text-align:center;padding:6px;background:var(--bg);border-radius:var(--r)"><div style="font-size:13px;font-weight:700;color:${slaRate>=90?'var(--green)':slaRate>=75?'var(--gold-dark)':'var(--red)'}">${tasks.length?slaRate+'%':'—'}</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase">SLA</div></div><div style="text-align:center;padding:6px;background:var(--bg);border-radius:var(--r)"><div style="font-size:13px;font-weight:700;color:${utilization.utilization>=71?'var(--green)':utilization.utilization>=31?'var(--gold-dark)':'var(--red)'}">${utilization.utilization}%</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase">Utilization</div></div><div style="text-align:center;padding:6px;background:var(--bg);border-radius:var(--r)"><div style="font-size:13px;font-weight:700;color:${activityScore>=70?'var(--green)':activityScore>=40?'var(--gold-dark)':'var(--red)'}">${activityScore}</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase">Activity</div></div></div></div><button class="btn btn-sm btn-secondary" onclick="openClientPortal('${c.id}')">View →</button></div></div>`;}).join('') || emptyState('No active clients to assess.')}<div style="margin-top:16px;padding:12px 14px;background:var(--navy-pale);border-radius:var(--r2);font-size:12px;color:var(--text)"><strong>Health Score Formula:</strong> Completion Rate (35%) + SLA Compliance (25%) + Utilization (25%) + Activity Recency (15%)</div>`;

async function toggleTask(id){
  const task=APP.data.tasks.find(x=>x.id===id);
  if(!task) return;
  const done=!task.done;
  const now=ts();
  await updateDoc('tasks',id,{done,status:done?'done':'open',completedDate:done?today():null,firstResponseAt:done&&!task.firstResponseAt?now:task.firstResponseAt,_actAction:done?'completed task':'reopened task',_actIcon:done?'✅':'↩️',_actColor:done?'green':'amber',_actRecord:task.title.slice(0,40)});

async function deleteTask(id){
  const task = APP.data.tasks.find(item => item.id === id);
  if(!task) return;
  if(!confirm(`Delete "${task.title}"? This removes it from the client portal.`)) return;
  APP.data.tasks = APP.data.tasks.filter(item => item.id !== id);
  lsSave('tasks', APP.data.tasks);
  logActivity('🗑️','deleted task','tasks',task.title.slice(0,40),'red',{clientId:task.clientId||null,taskId:id});
  closeModal();
  renderCurrentPage();
  toast('Task deleted.','warning');
}

}

async function savePayment(){
  const clientId = document.getElementById('f-pay-client').value;
  const invoiceId = document.getElementById('f-pay-invoice').value;
  const amountUsd = Number(document.getElementById('f-pay-amount').value || 0);
  if(!clientId){ toast('Please select a client.','error'); return; }
  if(!amountUsd){ toast('Please enter a payment amount.','error'); return; }
  const client = APP.data.clients.find(item => item.id === clientId);
  const paymentId = await addDoc('payments',{clientId,client:client?.name||'',invoiceId:invoiceId||null,amountUsd,date:document.getElementById('f-pay-date').value,method:document.getElementById('f-pay-method').value,note:document.getElementById('f-pay-note').value,archived:false,_actAction:'recorded payment',_actIcon:'💵',_actColor:'green',_actRecord:`${money(amountUsd)} from ${client?.name||'client'}`});
  if(invoiceId){
    const invoice = APP.data.invoices.find(item => item.id === invoiceId);
    if(invoice){
      const paid = PAYMENT_ENGINE.totalPaidForInvoice(invoiceId);
      const status = paid >= Number(invoice.amountUsd || 0) ? 'Paid' : (invoice.dueDate && new Date(invoice.dueDate) < new Date(today()) ? 'Overdue' : 'Sent');
      await updateDoc('invoices', invoiceId, { status, paidAt: status === 'Paid' ? document.getElementById('f-pay-date').value : null });
    }
  }
  closeModal();
  toast('Payment recorded successfully!','success');
  return paymentId;
}

async function markPaid(id){
  const invoice = APP.data.invoices.find(item => item.id === id);
  if(!invoice) return;
  const outstanding = PAYMENT_ENGINE.outstandingForInvoice(invoice);
  if(outstanding > 0){
    await addDoc('payments',{clientId:invoice.clientId,client:invoice.client,invoiceId:invoice.id,amountUsd:outstanding,date:today(),method:'Bank Transfer',note:'Marked paid from invoice action',archived:false,_actAction:'recorded payment',_actIcon:'💵',_actColor:'green',_actRecord:`${money(outstanding)} from ${invoice.client}`});
  }
  await updateDoc('invoices',id,{status:'Paid',paidAt:today(),_actAction:'marked invoice paid',_actIcon:'💰',_actColor:'green',_actRecord:invoice.number});
  toast(`Invoice ${invoice.number} marked as paid.`,'success');
}

function selectConv(id){
  APP.convActive = id;
  const conv = (APP.data.conversations||[]).find(c=>c.id===id);
  if(conv) conv.unread = 0;
  lsSave('conversations', APP.data.conversations);
  renderCurrentPage();
  updateSbBadges();
  setTimeout(()=>{ const el=document.getElementById('conv-messages-area'); if(el) el.scrollTop=el.scrollHeight; },50);
}

function sendConvMsg(convId){
  const body = document.getElementById('compose-body');
  const subj = document.getElementById('compose-subject');
  if(!body || !body.value.trim()) { toast('Message body is empty.','error'); return; }
  const conv = (APP.data.conversations||[]).find(c=>c.id===convId);
  if(!conv) return;
  conv.messages = conv.messages||[];
  const subject = (subj&&subj.value.trim()) || ('Re: '+((conv.messages.slice(-1)[0]?.subject)||'(No Subject)'));
  conv.messages.push({from:'out',subject,text:body.value.trim(),time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),date:'Today'});
  conv.preview = body.value.trim();
  conv.date = 'Today';
  body.value = '';
  if(subj) subj.value = '';
  lsSave('conversations', APP.data.conversations);
  renderCurrentPage();
  setTimeout(()=>{ const el=document.getElementById('conv-messages-area'); if(el) el.scrollTop=el.scrollHeight; },50);
}

function openReplyCompose(convId, msgIndex){
  const conv = (APP.data.conversations||[]).find(c=>c.id===convId);
  if(!conv) return;
  const origMsg = (conv.messages||[])[msgIndex];
  const replySubj = origMsg?.subject ? (origMsg.subject.startsWith('Re:')?origMsg.subject:'Re: '+origMsg.subject) : '(No Subject)';
  const subj = document.getElementById('compose-subject');
  const body = document.getElementById('compose-body');
  if(subj) { subj.value = replySubj; subj.focus(); }
  if(body) body.value = '';
  const area = document.getElementById('conv-compose-area');
  if(area) area.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function deleteConvMsg(convId, msgIndex){
  const conv = (APP.data.conversations||[]).find(c=>c.id===convId);
  if(!conv) return;
  conv.messages.splice(msgIndex, 1);
  conv.preview = conv.messages.length ? conv.messages[conv.messages.length-1].text : '';
  lsSave('conversations', APP.data.conversations);
  renderCurrentPage();
}

function openNewConversation(){
  const colors = ['navy','teal','gold','red','green','purple'];
  openModal('Compose New Message',`
    <div class="form-row">
      <div class="form-group"><label class="form-label">To (Contact Name) *</label><input class="form-control" id="f-cv-name" placeholder="e.g. Maria Santos"></div>
      <div class="form-group"><label class="form-label">Initials (auto-filled)</label><input class="form-control" id="f-cv-initials" placeholder="MS" maxlength="2"></div>
    </div>
    <div class="form-group"><label class="form-label">Subject *</label><input class="form-control" id="f-cv-subject" placeholder="e.g. Project Kickoff Details"></div>
    <div class="form-group"><label class="form-label">Message *</label><textarea class="form-control" id="f-cv-msg" rows="4" placeholder="Write your message here..."></textarea></div>
    <div class="form-group"><label class="form-label">Avatar Color</label><select class="form-control" id="f-cv-color">${colors.map(c=>`<option value="${c}">${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('')}</select></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewConversation()">Send ↗</button>`
  );
}

function saveNewConversation(){
  const name = document.getElementById('f-cv-name').value.trim();
  if(!name){ toast('Contact name required.','error'); return; }
  const subject = document.getElementById('f-cv-subject').value.trim();
  if(!subject){ toast('Subject is required.','error'); return; }
  const firstMsg = document.getElementById('f-cv-msg').value.trim();
  if(!firstMsg){ toast('Message body is required.','error'); return; }
  const initials = (document.getElementById('f-cv-initials').value.trim() || name.split(' ').map(n=>n[0]).join('').slice(0,2)).toUpperCase();
  const color = document.getElementById('f-cv-color').value;
  const id = 'cv' + Date.now();
  const messages = [{from:'out',subject,text:firstMsg,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),date:'Today'}];
  const conv = {id,contact:name,contactInitials:initials,contactColor:color,preview:firstMsg,date:'Today',unread:0,messages};
  APP.data.conversations = [conv, ...(APP.data.conversations||[])];
  lsSave('conversations', APP.data.conversations);
  APP.convActive = id;
  closeModal();
  renderCurrentPage();
  updateSbBadges();
  toast('Conversation started with '+name+'!','success');
}

function openEditConversation(id){
  const conv = (APP.data.conversations||[]).find(c=>c.id===id);
  if(!conv) return;
  const colors = ['navy','teal','gold','red','green','purple'];
  openModal('Edit Contact',`
    <div class="form-row">
      <div class="form-group"><label class="form-label">Contact Name *</label><input class="form-control" id="f-cev-name" value="${conv.contact}"></div>
      <div class="form-group"><label class="form-label">Initials</label><input class="form-control" id="f-cev-initials" value="${conv.contactInitials}" maxlength="2"></div>
    </div>
    <div class="form-group"><label class="form-label">Avatar Color</label><select class="form-control" id="f-cev-color">${colors.map(c=>`<option value="${c}"${c===conv.contactColor?' selected':''}>${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('')}</select></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-danger btn-sm" onclick="deleteConversation('${id}')">🗑 Delete</button><button class="btn btn-primary" onclick="saveEditConversation('${id}')">Save</button>`
  );
}

function saveEditConversation(id){
  const conv = (APP.data.conversations||[]).find(c=>c.id===id);
  if(!conv) return;
  const name = document.getElementById('f-cev-name').value.trim();
  if(!name){ toast('Name required.','error'); return; }
  conv.contact = name;
  conv.contactInitials = document.getElementById('f-cev-initials').value.trim().toUpperCase() || name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  conv.contactColor = document.getElementById('f-cev-color').value;
  lsSave('conversations', APP.data.conversations);
  closeModal();
  renderCurrentPage();
  toast('Conversation updated.','success');
}

function deleteConversation(id){
  const conv = (APP.data.conversations||[]).find(c=>c.id===id);
  if(!conv) return;
  if(!confirm(`Delete the conversation with "${conv.contact}"? This cannot be undone.`)) return;
  APP.data.conversations = APP.data.conversations.filter(c=>c.id!==id);
  lsSave('conversations', APP.data.conversations);
  APP.convActive = APP.data.conversations[0]?.id || null;
  closeModal();
  renderCurrentPage();
  updateSbBadges();
  toast('Conversation deleted.','warning');
}

function sendClientMessage(clientId, type){
  const input = document.getElementById('client-msg-input');
  if(!input || !input.value.trim()){ toast('Please type a message.','error'); return; }

  const conv = getOrCreateClientConv(clientId, type);
  const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  conv.messages = conv.messages || [];
  conv.messages.push({from:'client', text, time, date:'Today'});
  conv.preview = text;
  conv.date = 'Today';
  // Also mark unread for owner
  conv.unread = (conv.unread||0) + 1;
  lsSave('conversations', APP.data.conversations);
  APP.cpMsgThread = type;
  renderCurrentPage();
  setTimeout(()=>{const el=document.getElementById('client-chat-area'); if(el) el.scrollTop=el.scrollHeight;},50);
  toast('Message sent!','success');
}

function openChangeOwnerPin(){
  openModal('Change Owner PIN',`
    <div class="form-group"><label class="form-label">Current PIN</label><input type="password" class="form-control" id="f-pin-old" maxlength="4" placeholder="••••"></div>

    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveOwnerPin()">Save PIN</button>`
  );
}
function saveOwnerPin(){
  const old=document.getElementById('f-pin-old').value;
  const n=document.getElementById('f-pin-new').value;
  const c=document.getElementById('f-pin-confirm').value;
  if(old!==CFG.ownerPin){ toast('Current PIN is incorrect.','error'); return; }
  if(n.length!==4||!/^\d+$/.test(n)){ toast('PIN must be exactly 4 digits.','error'); return; }
  if(n!==c){ toast('New PINs do not match.','error'); return; }
  CFG.ownerPin=n;
  closeModal(); toast('Owner PIN updated successfully!','success');
}

/* ── CLIENT PIN MANAGEMENT (owner can set per client) ─────────── */
function openSetClientPin(clientId){
  const c=APP.data.clients.find(x=>x.id===clientId);
  if(!c) return;
  openModal('Set Portal PIN — '+c.name,`
    <div class="form-group"><label class="form-label">New 4-digit PIN for ${c.name}</label><input type="password" class="form-control" id="f-cp-pin" maxlength="4" placeholder="e.g. 5678"></div>
    <div class="form-note">The client will use this PIN to log into their portal.</div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveClientPin('${clientId}')">Set PIN</button>`
  );
}
function saveClientPin(clientId){
  const c=APP.data.clients.find(x=>x.id===clientId);
  if(!c) return;
  const p=document.getElementById('f-cp-pin').value;
  if(p.length!==4||!/^\d+$/.test(p)){ toast('PIN must be exactly 4 digits.','error'); return; }
  c.clientPin=p;
  lsSave('clients',APP.data.clients);
  closeModal(); toast('Client PIN updated for '+c.name,'success');
}

/* ══════════════════════════════════════════════════════════════
   CALENDAR SYSTEM — shared between clients, partners, management
══════════════════════════════════════════════════════════════ */
const CAL = {
  load(){ try{ return JSON.parse(localStorage.getItem('tjc-cal')||'[]'); }catch(e){ return []; } },
  save(evs){ localStorage.setItem('tjc-cal', JSON.stringify(evs)); },
  all(){ return this.load(); },
  forClient(cid){ return this.load().filter(e=>e.clientId===cid||e.sharedWith===cid); },
  forVA(vid){ return this.load().filter(e=>e.vaId===vid||e.sharedWith===vid); },
  forDate(d){ return this.load().filter(e=>e.date===d); },
  add(ev){ const evs=this.load(); ev.id='ev'+Date.now(); evs.push(ev); this.save(evs); return ev.id; },
  remove(id){ const evs=this.load().filter(e=>e.id!==id); this.save(evs); },
  typeColor(t){ return t==='appointment'?'var(--teal)':t==='task'?'var(--navy2)':t==='meeting'?'var(--gold)':t==='deadline'?'var(--red)':'var(--purple)'; },
  typeLabel(t){ return {appointment:'Appointment',task:'Task',meeting:'Meeting',deadline:'Deadline',personal:'Personal'}[t]||t; },
};

if(!APP.cal) APP.cal = { view:'month', year:new Date().getFullYear(), month:new Date().getMonth(), selDate:null };

/* ══════════════════════════════════════════════════════════════
   CALENDAR RENDER — used by client, partner, and management
══════════════════════════════════════════════════════════════ */
function renderCalendarView(scopeType, scopeId, scopeLabel){
  const y=APP.cal.year, m=APP.cal.month;
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const td=today();

  // Load events for this scope
  let events = scopeType==='client' ? CAL.forClient(scopeId) : scopeType==='va' ? CAL.forVA(scopeId) : CAL.all();

  // Build day grid
  let cells='';
  let dayCount=1;
  for(let row=0;row<6;row++){
    for(let col=0;col<7;col++){
      const cellNum=row*7+col;
      const isBlank=cellNum<firstDay||(dayCount>daysInMonth);
      if(isBlank){ cells+=`<div class="cal-cell cal-cell-blank"></div>`; continue; }
      const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(dayCount).padStart(2,'0')}`;
      const dayEvents=events.filter(e=>e.date===dateStr);
      const isToday=dateStr===td;
      const isSel=dateStr===APP.cal.selDate;
      cells+=`<div class="cal-cell${isToday?' cal-today':''}${isSel?' cal-sel':''}" onclick="APP.cal.selDate='${dateStr}';renderCurrentPage()">
        <div class="cal-day-num${isToday?' cal-today-num':''}">${dayCount}</div>
        <div class="cal-dots">${dayEvents.slice(0,3).map(e=>`<div class="cal-dot" style="background:${CAL.typeColor(e.type)}" title="${e.title}"></div>`).join('')}${dayEvents.length>3?`<div class="cal-dot-more">+${dayEvents.length-3}</div>`:''}</div>
        ${dayEvents.slice(0,2).map(e=>`<div class="cal-ev-chip" style="background:${CAL.typeColor(e.type)}20;border-left:2px solid ${CAL.typeColor(e.type)};color:${CAL.typeColor(e.type)}">${e.time?e.time+' ':''}${e.title.slice(0,16)}${e.title.length>16?'…':''}</div>`).join('')}
      </div>`;
      dayCount++;
    }
    if(dayCount>daysInMonth) break;
  }

  // Selected day panel
  const selEvents = APP.cal.selDate ? events.filter(e=>e.date===APP.cal.selDate) : [];
  const selPanel = APP.cal.selDate ? `
    <div class="cal-day-panel">
      <div class="cal-day-panel-head">
        <div style="font-weight:700;font-size:14px">${new Date(APP.cal.selDate+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
        <button class="btn btn-sm btn-primary" onclick="openCalAddEvent('${scopeType}','${scopeId}','${APP.cal.selDate}')">+ Add Event</button>
      </div>
      ${selEvents.length===0?`<div class="cal-empty-day">No events — click + Add Event to schedule something.</div>`:''}
      ${selEvents.map(e=>`<div class="cal-ev-row">
        <div class="cal-ev-color-bar" style="background:${CAL.typeColor(e.type)}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${e.title}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${CAL.typeLabel(e.type)}${e.time?' · '+e.time:''}${e.duration?' · '+e.duration+'min':''}</div>
          ${e.note?`<div style="font-size:11px;color:var(--text2);margin-top:2px">${e.note}</div>`:''}
          ${e.createdByName?`<div style="font-size:10px;color:var(--text3);margin-top:2px">Added by ${e.createdByName}</div>`:''}
        </div>
        <button class="btn-icon" onclick="calRemoveEvent('${e.id}','${scopeType}','${scopeId}')" title="Remove" style="color:var(--red);font-size:14px">✕</button>
      </div>`).join('')}
    </div>` : `<div class="cal-day-panel" style="display:flex;align-items:center;justify-content:center;min-height:120px;color:var(--text3);font-size:13px">Select a date to view or add events</div>`;

  return `
    <div class="cal-wrap">
      <div class="cal-header">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn btn-sm btn-secondary" onclick="calNav(-1)">‹</button>
          <div style="font-size:16px;font-weight:700;min-width:160px;text-align:center">${monthNames[m]} ${y}</div>
          <button class="btn btn-sm btn-secondary" onclick="calNav(1)">›</button>
          <button class="btn btn-sm btn-secondary" onclick="APP.cal.selDate='${td}';APP.cal.year=${new Date().getFullYear()};APP.cal.month=${new Date().getMonth()};renderCurrentPage()">Today</button>
        </div>
        <div style="font-size:11px;color:var(--text3)">Shared calendar · ${scopeLabel}</div>
      </div>
      <div class="cal-grid-head">${dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
      ${selPanel}
      <div class="cal-legend">
        ${['appointment','task','meeting','deadline','personal'].map(t=>`<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)"><div style="width:10px;height:10px;border-radius:50%;background:${CAL.typeColor(t)}"></div>${CAL.typeLabel(t)}</div>`).join('')}
      </div>
    </div>`;
}

function calNav(dir){
  APP.cal.month+=dir;
  if(APP.cal.month>11){APP.cal.month=0;APP.cal.year++;}
  if(APP.cal.month<0){APP.cal.month=11;APP.cal.year--;}
  APP.cal.selDate=null;
  renderCurrentPage();
}

function calRemoveEvent(id, scopeType, scopeId){
  CAL.remove(id);
  renderCurrentPage();
  toast('Event removed','success');
}

function openCalAddEvent(scopeType, scopeId, date){
  // Determine who is adding the event
  let createdByName='';
  let clientId=null, vaId=null, sharedWith=null;
  if(scopeType==='client'){
    const c=APP.data.clients.find(x=>x.id===scopeId);
    createdByName=c?c.name:'Client';
    clientId=scopeId;
    vaId=c?c.assignedVaUid:null;
    sharedWith=vaId;
  } else if(scopeType==='va'){
    const v=APP.data.team.find(x=>x.id===scopeId);
    createdByName=v?v.displayName:'Partner';
    vaId=scopeId;
  } else {
    createdByName='Management';
  }

  openModal('Add Event — '+date,`

function saveCalEvent(scopeType,scopeId,date,createdByName,clientId,vaId,sharedWith){
  const title=document.getElementById('cal-title').value.trim();
  if(!title){ toast('Please enter a title.','error'); return; }
  const share=document.getElementById('cal-share').value;
  CAL.add({
    date, title,
    type: document.getElementById('cal-type').value,
    time: document.getElementById('cal-time').value||'',
    duration: document.getElementById('cal-dur').value||'',
    note: document.getElementById('cal-note').value||'',
    createdByName, scopeType, scopeId,
    clientId: clientId||null,
    vaId: vaId||null,
    sharedWith: share==='yes'?(sharedWith||null):null,
  });
  closeModal();
  APP.cal.selDate=date;
  renderCurrentPage();
  toast('Event added to calendar!','success');
}

  closeModal();

function removeClientCred(clientId,idx){
  const creds=clientCreds(clientId);
  creds.splice(idx,1);

  renderCurrentPage();

}

/* ══ 1. WEEKLY KPI SUMMARY (injected into My Day) ══ */
function renderVAWeeklySummary(va, myTasks, myLogs){
  const now = new Date();
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-now.getDay()+1); weekStart.setHours(0,0,0,0);
  const weekStr = weekStart.toISOString().split('T')[0];
  const weekLogs = myLogs.filter(l=>l.date>=weekStr);
  const weekMins = weekLogs.reduce((a,l)=>a+(l.minutes||0),0);
  const weekH = Math.floor(weekMins/60), weekM = weekMins%60;
  const weekDone = myTasks.filter(t=>t.done&&t.completedAt&&t.completedAt>=weekStr).length;
  const weekOverdue = myTasks.filter(t=>!t.done&&t.dueDate&&t.dueDate>=weekStr&&t.dueDate<today()).length;
  const oos = myTasks.filter(t=>t.isOos&&!t.done);
  const oosVal = oos.length * 75;
  const kpi = KPI.score(va);
  const sla = SLA.vaRate(va.id);
  const eods = vaLS('eod',va.id);
  const eodStreak = (()=>{let s=0;const td=new Date();for(let i=0;i<7;i++){const d=new Date(td);d.setDate(td.getDate()-i);const ds=d.toISOString().split('T')[0];if(eods.find(e=>e.date===ds))s++;else if(i>0)break;}return s;})();

  return `
  <div class="card" style="margin-bottom:14px;background:linear-gradient(135deg,var(--navy) 0%,#0e2a40 100%);border:none;color:#fff;padding:0;overflow:hidden">
    <div style="padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,.08)">
      <div style="font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">This Week's Performance</div>
      <div style="font-size:13px;font-weight:600;color:rgba(255,255,255,.9)">Week of ${weekStart.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:0">
      ${[
        ['Tasks Done',weekDone,'','var(--green)'],
        ['Hours Logged',weekH+'h '+weekM+'m','','var(--teal)'],
        ['KPI Score',kpi,'',kpi>=90?'var(--green)':kpi>=75?'var(--gold)':'var(--red)'],
        ['SLA Rate',sla+'%','',sla>=90?'var(--green)':sla>=75?'var(--gold)':'var(--red)'],
        ['EOD Streak',eodStreak+'d','streak','var(--gold)'],
        oos.length?['OOS Opps','$'+oosVal,'potential','var(--purple)']:null,
      ].filter(Boolean).map(([label,val,sub,color])=>`
        <div style="padding:12px 14px;border-right:1px solid rgba(255,255,255,.07);border-bottom:1px solid rgba(255,255,255,.07)">
          <div style="font-size:18px;font-weight:700;color:${color}">${val}</div>
          <div style="font-size:10px;color:rgba(255,255,255,.45);margin-top:2px;text-transform:uppercase;letter-spacing:.04em">${label}</div>
          ${sub?`<div style="font-size:9px;color:rgba(255,255,255,.3)">${sub}</div>`:''}
        </div>`).join('')}
    </div>
    ${weekOverdue>0?`<div style="padding:8px 14px;background:rgba(163,45,45,.3);font-size:11px;color:#ffaaaa">⚠ ${weekOverdue} task${weekOverdue>1?'s':''} overdue this week — prioritize these today.</div>`:''}
    ${oos.length>0?`<div style="padding:8px 14px;background:rgba(83,64,183,.25);font-size:11px;color:#c4b7ff">💰 ${oos.length} OOS task${oos.length>1?'s':''} — potential $${oosVal} upsell opportunity. Flag in your EOD report.</div>`:''}
  </div>`;
}

/* ══ 2. TASK TIMER (per task) ══ */
function startTaskTimer(taskId, taskTitle, vaId){
  if(APP.va.taskTimer){
    if(!confirm('Stop "'+APP.va.taskTimer.title+'" timer and start new one?')) return;
    stopTaskTimer(vaId, true);
  }
  APP.va.taskTimer = { taskId, title: taskTitle, startedAt: Date.now() };
  toast('⏱ Timer started: '+taskTitle.slice(0,30),'success');
  renderCurrentPage();
}

function stopTaskTimer(vaId, silent){
  if(!APP.va.taskTimer) return;
  const mins = Math.round((Date.now()-APP.va.taskTimer.startedAt)/60000);
  const t = APP.va.taskTimer;
  APP.va.taskTimer = null;
  if(mins < 1){ if(!silent) toast('Timer stopped (less than 1 min — not logged).',''); renderCurrentPage(); return; }
  APP.data.timelogs.push({
    id:'tl-task-'+Date.now(), vaUid:vaId,
    taskId:t.taskId, taskTitle:t.title,
    date:today(), minutes:mins,
    note:'Auto-logged via task timer'
  });
  lsSave('timelogs', APP.data.timelogs);
  if(!silent) toast('⏱ '+mins+'m logged for: '+t.title.slice(0,30),'success');
  renderCurrentPage();
}

function fmtTimerLive(startedAt){
  const s = Math.floor((Date.now()-startedAt)/1000);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return (h?h+'h ':'')+m+'m '+sec+'s';
}

/* ══ 3. SOP RUNNER ══ */
function renderVASopRunner(va){
  const sops = APP.data.sops||[];
  const sel = APP.va.sopRunnerId;
  const prog = vaLSObj('soprun',va.id); // { sopId: [0,1,0,...] }

  if(!sel || !sops.find(s=>s.id===sel)){
    return `<div style="max-width:680px;margin:0 auto">
      <div class="sec-head"><div class="sec-title">📋 SOP Runner</div></div>
      <div class="form-hint" style="margin-bottom:14px">Select an SOP below to run through its steps one by one. Your progress is saved automatically.</div>
      ${sops.length===0?emptyState('No SOPs available. Ask management to add SOPs to the library.'):''}
      <div style="display:grid;gap:10px">
        ${sops.map(s=>{
          const steps=s.steps||[];const done=(prog[s.id]||[]).filter(Boolean).length;
          const pct=steps.length?Math.round(done/steps.length*100):0;
          return `<div class="card card-pad card-hover" onclick="APP.va.sopRunnerId='${s.id}';renderCurrentPage()">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="font-size:24px">${s.emoji||'📋'}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:14px;font-weight:600">${s.title}</div>
                <div style="font-size:11px;color:var(--text3)">${steps.length} steps${s.driveUrl?` · <a href="${s.driveUrl}" target="_blank" onclick="event.stopPropagation()" style="color:var(--teal)">Open Doc ↗</a>`:''}</div>
                <div style="height:4px;background:var(--border);border-radius:2px;margin-top:8px">
                  <div style="height:100%;background:${pct===100?'var(--green)':'var(--teal)'};border-radius:2px;width:${pct}%;transition:width .3s"></div>
                </div>
                <div style="font-size:10px;color:var(--text3);margin-top:3px">${done}/${steps.length} steps · ${pct}% complete</div>
              </div>
              <div style="font-size:22px">${pct===100?'✅':'▶'}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  const sop = sops.find(s=>s.id===sel);
  const steps = sop.steps||[];
  const stepsDone = prog[sel]||new Array(steps.length).fill(false);
  const doneCnt = stepsDone.filter(Boolean).length;
  const pct = steps.length?Math.round(doneCnt/steps.length*100):0;

  return `<div style="max-width:680px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button class="btn btn-sm btn-secondary" onclick="APP.va.sopRunnerId=null;renderCurrentPage()">← Back</button>
      <div style="flex:1">
        <div style="font-size:16px;font-weight:700">${sop.emoji||'📋'} ${sop.title}</div>
        <div style="font-size:11px;color:var(--text3)">${doneCnt}/${steps.length} steps complete · ${pct}%</div>
      </div>
      ${sop.driveUrl?`<a href="${sop.driveUrl}" target="_blank" class="btn btn-sm btn-secondary">📄 Open Doc</a>`:''}
      <button class="btn btn-sm btn-secondary" style="color:var(--text3)" onclick="resetSopProgress('${va.id}','${sel}')">Reset</button>
    </div>
    <div style="height:6px;background:var(--border);border-radius:3px;margin-bottom:16px">
      <div style="height:100%;background:${pct===100?'var(--green)':'var(--teal)'};border-radius:3px;width:${pct}%;transition:width .4s"></div>
    </div>
    ${pct===100?`<div class="card card-pad" style="text-align:center;margin-bottom:14px;background:var(--green-pale);border-color:var(--green)">
      <div style="font-size:28px;margin-bottom:6px">🎉</div>
      <div style="font-size:14px;font-weight:700;color:var(--green)">SOP Complete!</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">All ${steps.length} steps done. Log this in your EOD report.</div>
    </div>`:''}
    <div class="card">
      ${steps.map((step,i)=>`
        <div style="display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:${stepsDone[i]?'var(--green-pale)':''}" onclick="toggleSopStep('${va.id}','${sel}',${i},${steps.length})">
          <div style="width:22px;height:22px;border-radius:50%;border:2px solid ${stepsDone[i]?'var(--green)':'var(--border2)'};background:${stepsDone[i]?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">
            ${stepsDone[i]?'<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5l2.5 2.5 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
          </div>
          <div style="flex:1">
            <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">Step ${i+1}</div>
            <div style="font-size:13px;${stepsDone[i]?'text-decoration:line-through;color:var(--text3)':'font-weight:500'}">${step}</div>
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

function toggleSopStep(vaId, sopId, idx, total){
  const prog = vaLSObj('soprun', vaId);
  if(!prog[sopId]) prog[sopId] = new Array(total).fill(false);
  prog[sopId][idx] = !prog[sopId][idx];
  vaSaveLSObj('soprun', vaId, prog);
  const done = prog[sopId].filter(Boolean).length;
  if(done===total) toast('🎉 SOP complete! Log it in your EOD report.','success');
  renderCurrentPage();
}

function resetSopProgress(vaId, sopId){
  if(!confirm('Reset all progress for this SOP?')) return;

function saveEODDraft(){
  if(!APP.va.eodDraft) APP.va.eodDraft={};
  ['completed','blockers','clientUpdates','tomorrow','oos','hours'].forEach(f=>{
    const el=document.getElementById('eod-'+f.toLowerCase().replace(/[A-Z]/g,c=>'-'+c.toLowerCase()));
    if(el) APP.va.eodDraft[f]=el.value;
  });
  // also check non-hyphenated
  const elC=document.getElementById('eod-completed'); if(elC) APP.va.eodDraft.completed=elC.value;
  const elH=document.getElementById('eod-hours'); if(elH) APP.va.eodDraft.hours=elH.value;
  const elT=document.getElementById('eod-tomorrow'); if(elT) APP.va.eodDraft.tomorrow=elT.value;
  const elO=document.getElementById('eod-oos'); if(elO) APP.va.eodDraft.oos=elO.value;
  const elB=document.getElementById('eod-blockers'); if(elB) APP.va.eodDraft.blockers=elB.value;
  const elU=document.getElementById('eod-client-updates'); if(elU) APP.va.eodDraft.clientUpdates=elU.value;
  toast('Draft saved!','success');
}

function submitEODReport(vaId){
  const completed=(document.getElementById('eod-completed')?.value||'').trim();
  const tomorrow=(document.getElementById('eod-tomorrow')?.value||'').trim();
  if(!completed){toast('Please fill in tasks completed today.','error');return;}
  if(!tomorrow){toast("Please fill in tomorrow's plan.",'error');return;}
  const reports=vaLS('eod',vaId);
  const td=today();
  const idx=reports.findIndex(r=>r.date===td);
  const r={date:td,completed,
    blockers:(document.getElementById('eod-blockers')?.value||''),
    clientUpdates:(document.getElementById('eod-client-updates')?.value||''),
    tomorrow,oos:(document.getElementById('eod-oos')?.value||''),
    hours:(document.getElementById('eod-hours')?.value||'0'),
    rating:document.querySelector('input[name="eod-rating"]:checked')?.value||'3',
    submittedAt:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
  };
  if(idx>=0) reports[idx]=r; else reports.push(r);
  vaSaveLS('eod',vaId,reports);
  APP.va.eodDraft={}; APP.va.eodEditToday=false;
  renderCurrentPage();
  toast('EOD submitted! Great work today 🎉','success');
}

function openLeaveForm(vaId){
  openModal('Request Leave',`
    <div class="form-group"><label class="form-label">Leave Type</label>
      <select class="form-control" id="leave-type">
        <option>Sick Leave</option><option>Vacation / Rest Day</option>

        <input class="form-control" id="leave-start" type="date" min="${today()}"></div>
      <div class="form-group"><label class="form-label">End Date *</label>
        <input class="form-control" id="leave-end" type="date" min="${today()}"></div>
    </div>
    <div class="form-group"><label class="form-label">Reason / Notes</label>
      <textarea class="form-control" id="leave-reason" rows="3" placeholder="Brief explanation. Required for non-sick leave."></textarea></div>
    <div class="form-hint">Management will be notified and will respond within 1 business day.</div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="submitLeaveRequest('${vaId}')">Submit Request</button>`
  );

function submitLeaveRequest(vaId){
  const type=document.getElementById('leave-type').value;
  const start=document.getElementById('leave-start').value;
  const end=document.getElementById('leave-end').value;
  const reason=document.getElementById('leave-reason').value.trim();
  if(!start||!end){toast('Please select dates.','error');return;}
  if(new Date(end)<new Date(start)){toast('End date must be after start date.','error');return;}
  const days=Math.ceil((new Date(end)-new Date(start))/86400000)+1;
  const leaves=vaLS('leave',vaId);
  leaves.push({id:'lv-'+Date.now(),type,startDate:start,endDate:end,days,reason,
    status:'pending',managementNote:'',submittedAt:new Date().toLocaleString()});
  vaSaveLS('leave',vaId,leaves);
  closeModal(); renderCurrentPage();
  toast('Leave request submitted! Justine will respond soon. 📬','success');
}

        <div style="font-size:26px;font-weight:700;color:${reqDone===required.length?'var(--green)':'var(--red)'}">${reqDone}<span style="font-size:14px;color:var(--text3)">/${required.length}</span></div>
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin:4px 0">Required Done</div>
        <div style="height:5px;background:var(--border);border-radius:3px"><div style="height:100%;background:${reqDone===required.length?'var(--green)':'var(--red)'};border-radius:3px;width:${Math.round(reqDone/required.length*100)}%"></div></div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px">${reqDone===required.length?'✓ All required done!':'Finish required first'}</div>
      </div>
      <div class="card card-pad" style="text-align:center">
        <div style="font-size:26px;font-weight:700;color:var(--purple)">${TJC_RESOURCES.filter(r=>!progress[r.id]&&r.tag==='important').length}</div>
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin:4px 0">Important Remaining</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">High-value next steps</div>
      </div>
    </div>

    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;overflow-x:auto;padding-bottom:4px">
      <div class="ftab${filterCat==='all'?' on':''}" onclick="APP.va.learningCat='all';renderCurrentPage()">All (${TJC_RESOURCES.length})</div>
      ${cats.map(c=>`<div class="ftab${filterCat===c?' on':''}" onclick="APP.va.learningCat='${c.replace(/['"]/g,'')}';renderCurrentPage()">${c} (${TJC_RESOURCES.filter(r=>r.cat===c).length})</div>`).join('')}
    </div>

    <div style="display:grid;gap:8px">
      ${shown.map(r=>{
        const done=!!progress[r.id];
        const borderColor=r.tag==='required'?'var(--red)':r.tag==='important'?'var(--gold)':'var(--border)';
        return `<div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-left:3px solid ${borderColor};${done?'opacity:.7':''}">
          <div style="font-size:22px;flex-shrink:0">${r.icon}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
              <div style="font-size:13px;font-weight:600;${done?'text-decoration:line-through;color:var(--text3)':''}">${r.title}</div>
              ${r.tag==='required'?`<span class="tag t-red" style="font-size:9px">Required</span>`:r.tag==='important'?`<span class="tag t-gold" style="font-size:9px">Important</span>`:''}
            </div>
            <div style="font-size:11px;color:var(--text3)">${r.desc}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:3px">⏱ ${r.dur} · ${r.cat}</div>
          </div>
          <div style="flex-shrink:0">
            ${done
              ?`<button class="btn btn-sm btn-secondary" style="font-size:11px;color:var(--green);border-color:var(--green)" onclick="toggleLearningProgress('${va.id}','${r.id}',false)">✓ Done</button>`
              :`<button class="btn btn-sm btn-primary" onclick="toggleLearningProgress('${va.id}','${r.id}',true)">Mark Done</button>`}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function toggleLearningProgress(vaId,resId,done){
  const prog=vaLSObj('learning',vaId);
  if(done) prog[resId]=true; else delete prog[resId];
  vaSaveLSObj('learning',vaId,prog);
  renderCurrentPage();
  if(done) toast('✅ Resource marked complete! Keep going 🎓','success');
}


function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('tjc-theme', next);
}

document.addEventListener('DOMContentLoaded', () => {
  // ── THEME INIT ──
  (function initTheme(){
    const stored = localStorage.getItem('tjc-theme');
    const system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', stored || system);
  })();

  loadAllData();
  APP.cal = { view:'month', year:new Date().getFullYear(), month:new Date().getMonth(), selDate:null };
  APP.profile = APP.data.team.find(v => v.id === 'u1') || SEED.team[0];
  APP.role = 'owner';
  buildNav();
  buildTopbarActions();
  buildBottomNav();
  updateUserInfo();
  updateExchangeRateDisplay();
  rotateDailyVerse();
  fetchLiveExchangeRate();
  // Start at auth chooser — no one is logged in yet
  APP.authMode = null;
  APP.authStep = 'choose';
  renderCurrentPage();
});
</script>
</body>
</html>
