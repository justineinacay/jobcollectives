.sb-item:hover{color:#fff;background:rgba(255,255,255,.07)}
.sb-item.on{color:#fff;background:rgba(201,168,76,.18);font-weight:500}
.sb-item.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);border-radius:0 2px 2px 0}
.sb-item svg{width:13px;height:13px;flex-shrink:0;opacity:.7}
.sb-item.on svg,.sb-item:hover svg{opacity:1}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center}
.sb-badge.warn{background:var(--gold)}
.sb-footer{flex-shrink:0;padding:10px 12px;border-top:1px solid rgba(255,255,255,.1)}
.sb-fx{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:var(--r);padding:8px 10px;margin-bottom:8px}
.sb-fx-label{font-size:9px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.sb-fx-row{display:flex;align-items:center;gap:4px}
.sb-fx-val{font-size:13px;font-weight:700;color:#fff}
.sb-fx-sub{font-size:10px;color:rgba(255,255,255,.45);flex:1}
.sb-fx-edit{width:22px;height:22px;border:1px solid rgba(255,255,255,.2);border-radius:5px;background:transparent;color:rgba(255,255,255,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.sb-fx-edit:hover{background:rgba(255,255,255,.1);color:#fff}
.sb-verse{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.18);border-radius:var(--r);padding:7px 9px;margin-bottom:8px}
.sb-verse-ref{font-size:9px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.sb-verse-text{font-size:10px;color:rgba(255,255,255,.6);font-style:italic;line-height:1.5}
.sb-user{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r);cursor:pointer;transition:background .15s}
.sb-user:hover{background:rgba(255,255,255,.07)}
.sb-user-info{flex:1;min-width:0}
.sb-user-name{font-size:12px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:10px;color:rgba(255,255,255,.45)}

/* ── MAIN AREA ───────────────────────────────────────── */
.main-area{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:4px}
.hamburger span{width:18px;height:2px;background:var(--text2);border-radius:2px;display:block}
.page-title{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap}
.rt-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)}
.rt-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-right{display:flex;align-items:center;gap:7px}
.content-area{flex:1;overflow-y:auto;padding:18px}
.bottom-nav{display:none;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border)}
.bn-inner{display:flex;justify-content:space-around;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;cursor:pointer;color:var(--text3);font-size:10px;min-width:48px;border-radius:var(--r);position:relative}
.bn-item.on{color:var(--navy)}
.bn-item.on .bn-icon{background:var(--navy-pale)}
.bn-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.bn-icon svg{width:16px;height:16px}
.bn-dot{position:absolute;top:2px;right:8px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid var(--surface)}

/* ── AVATARS ─────────────────────────────────────────── */
.av{border-radius:50%;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:.02em}
.av-xs{width:16px;height:16px;font-size:8px}
.av-sm{width:22px;height:22px;font-size:9px}
.av-md{width:30px;height:30px;font-size:11px}
.av-lg{width:40px;height:40px;font-size:14px}
.av-xl{width:52px;height:52px;font-size:18px}
.av-navy{background:var(--navy-pale);color:var(--navy)}
.av-teal{background:var(--teal-pale);color:var(--teal-dark)}
.av-gold{background:var(--gold-pale);color:var(--gold-dark)}
.av-red{background:var(--red-pale);color:var(--red)}
.av-green{background:var(--green-pale);color:var(--green)}
.av-purple{background:var(--purple-pale);color:var(--purple)}

/* ── TAGS ────────────────────────────────────────────── */
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;white-space:nowrap;letter-spacing:.02em}
.t-navy{background:var(--navy-pale);color:var(--navy)}
.t-gold{background:var(--gold-pale);color:var(--gold-dark)}
.t-teal{background:var(--teal-pale);color:var(--teal-dark)}
.t-green{background:var(--green-pale);color:var(--green)}
.t-red{background:var(--red-pale);color:var(--red)}
.t-amber{background:var(--amber-pale);color:var(--amber)}
.t-gray{background:#F1F3F7;color:var(--text2)}
.t-purple{background:var(--purple-pale);color:var(--purple)}

/* ── CARDS ───────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.card-pad{padding:14px 16px}
.card-hover{transition:all .18s;cursor:pointer}
.card-hover:hover{box-shadow:var(--shadow);transform:translateY(-1px)}

/* ── KPI CARDS ───────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;border-left:3px solid var(--border2);transition:all .2s;cursor:pointer}
.kpi-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.kpi-label{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.kpi-label svg{width:11px;height:11px}
.kpi-val{font-size:24px;font-weight:700;line-height:1;margin-bottom:3px}
.kpi-sub{font-size:11px;color:var(--text3)}
.kpi-sub2{font-size:10px;color:var(--text3);margin-top:2px}
.kpi-up{color:var(--green)}
.kpi-dn{color:var(--red)}
.kpi-warn{color:var(--amber)}

/* ── SECTIONS ────────────────────────────────────────── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:5px}
.sec-title svg{width:13px;height:13px;color:var(--text3)}
.sec-action{font-size:11px;color:var(--teal);cursor:pointer;font-weight:500}
.sec-action:hover{text-decoration:underline}

/* ── PIPELINE ────────────────────────────────────────── */
.pipeline{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:20px}
.pipe-col{min-width:174px;flex:1}
.pipe-col-head{display:flex;align-items:center;justify-content:space-between;padding:0 4px 7px;font-size:11px;font-weight:600;color:var(--text2)}
.pipe-count{width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.pipe-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:9px;margin-bottom:6px;cursor:pointer;position:relative;transition:all .15s}
.pipe-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);border-color:var(--border2)}
.pipe-card-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.pipe-card-name{font-size:12px;font-weight:600;padding-left:7px;margin-bottom:2px;line-height:1.3}
.pipe-card-meta{font-size:10px;color:var(--text3);padding-left:7px;margin-bottom:3px}
.pipe-card-rate{font-size:11px;font-weight:600;padding-left:7px;margin-bottom:5px}
.pipe-card-margin{font-size:10px;padding-left:7px;margin-bottom:4px;font-weight:600}
.pipe-add{border:1.5px dashed var(--border2);border-radius:var(--r);padding:7px;text-align:center;font-size:11px;color:var(--text3);cursor:pointer;transition:all .15s}
.pipe-add:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-pale)}

/* ── TABLES ──────────────────────────────────────────── */
.data-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.data-table th{text-align:left;padding:7px 12px;font-size:10px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.data-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.data-table tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:#FAFBFE;cursor:pointer}

/* ── TASKS ───────────────────────────────────────────── */
.task-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:#FAFBFE}
.task-row.overdue-row{background:#FFF8F8}
.chk{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;position:relative;transition:all .15s;cursor:pointer}
.chk.done{background:var(--teal);border-color:var(--teal)}
.chk.done::after{content:'';position:absolute;left:3px;top:.5px;width:5px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg)}
.task-name{font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-name.done{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;align-items:center;gap:5px;flex-shrink:0}
.sla-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px}
.sla-ok{background:var(--green-pale);color:var(--green)}
.sla-warn{background:var(--amber-pale);color:var(--amber)}
.sla-breach{background:var(--red-pale);color:var(--red)}

/* ── PROGRESS ────────────────────────────────────────── */
.prog{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--teal);transition:width .4s}
.prog-lg{height:8px;border-radius:4px;background:var(--border);overflow:hidden}
.prog-lg .prog-fill{height:100%;border-radius:4px}

/* ── VA CAPACITY ─────────────────────────────────────── */
.va-cap-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid var(--border)}
.va-cap-row:last-child{border-bottom:none}
.va-cap-info{flex:1;min-width:0}
.va-cap-name{font-size:13px;font-weight:600}
.va-cap-role{font-size:10px;color:var(--text3)}
.va-cap-pct{font-size:12px;font-weight:700;min-width:32px;text-align:right}
.cap-warning{margin-top:6px;padding:7px 10px;border-radius:var(--r);font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px}
.cap-warning.over{background:var(--red-pale);color:var(--red)}
.cap-warning.warn{background:var(--amber-pale);color:var(--amber)}

/* ── MARGIN INDICATOR ────────────────────────────────── */
.margin-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.margin-fill{height:100%;border-radius:2px}
.margin-green{background:var(--green)}
.margin-yellow{background:var(--gold)}
.margin-red{background:var(--red)}
.margin-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px}
.mb-green{background:var(--green-pale);color:var(--green)}
.mb-yellow{background:var(--gold-pale);color:var(--gold-dark)}
.mb-red{background:var(--red-pale);color:var(--red)}

/* ── DUAL CURRENCY DISPLAY ───────────────────────────── */
.dual-currency{display:flex;flex-direction:column}
.dc-primary{font-size:15px;font-weight:700;line-height:1.2}
.dc-secondary{font-size:10px;color:var(--text3);font-weight:500}
.currency-usd{color:var(--teal-dark)}
.currency-php{color:var(--navy)}

/* ── KPI TIER BADGES ─────────────────────────────────── */
.tier-vanguard{background:linear-gradient(135deg,var(--gold-pale),#fff8e8);color:var(--gold-dark);border:1px solid var(--gold);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.tier-cornerstone{background:var(--teal-pale);color:var(--teal-dark);border:1px solid var(--teal);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.tier-waypoint{background:var(--navy-pale);color:var(--navy);border:1px solid var(--navy-mid);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}

/* ── HEALTH SCORE ────────────────────────────────────── */
.health-ring{position:relative;width:56px;height:56px;flex-shrink:0}
.health-ring svg{width:56px;height:56px;transform:rotate(-90deg)}
.health-ring .track{fill:none;stroke:var(--border);stroke-width:5}
.health-ring .fill{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.health-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}

/* ── ACTIVITY LOG ────────────────────────────────────── */
.activity-item{display:flex;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.activity-body{flex:1;min-width:0}
.activity-action{font-size:12px;font-weight:500;line-height:1.4}
.activity-meta{font-size:10px;color:var(--text3);margin-top:2px}

/* ── SLA ─────────────────────────────────────────────── */
.sla-stat{text-align:center;padding:10px}
.sla-stat-val{font-size:22px;font-weight:700}
.sla-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

/* ── OOS (Out-of-Scope) ──────────────────────────────── */
.oos-badge{background:var(--purple-pale);color:var(--purple);border:1px solid rgba(83,64,183,.25);font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px}

/* ── ONBOARDING STEPS ────────────────────────────────── */
.ob-step{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ob-step:last-child{border-bottom:none}
.ob-step-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700}
.ob-done{background:var(--teal);color:#fff}
.ob-pending{background:var(--border);color:var(--text3)}
.ob-step-name{flex:1;font-size:13px}
.ob-step-name.done{color:var(--text3);text-decoration:line-through}

/* ── FORMS ───────────────────────────────────────────── */
.form-group{margin-bottom:13px}
.form-label{font-size:10px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.form-control{width:100%;padding:8px 11px;border-radius:var(--r);border:1px solid var(--border2);font-size:13px;font-family:var(--font);color:var(--text);background:var(--surface);outline:none;transition:border .15s}
.form-control:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(42,127,127,.1)}
textarea.form-control{resize:vertical;min-height:80px}
select.form-control{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-note{font-size:11px;color:var(--text3);margin-top:4px}
.form-hint{padding:9px 11px;background:var(--navy-pale);border-radius:var(--r);font-size:11px;color:var(--navy);margin-bottom:12px}
.form-warn{padding:9px 11px;background:var(--amber-pale);border-radius:var(--r);font-size:11px;color:var(--amber);margin-bottom:12px}
.form-danger{padding:9px 11px;background:var(--red-pale);border-radius:var(--r);font-size:11px;color:var(--red);margin-bottom:12px}

/* ── BUTTONS ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r);border:1px solid transparent;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.btn svg{width:12px;height:12px}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy2)}
.btn-teal{background:var(--teal);color:#fff}
.btn-teal:hover{background:var(--teal-dark)}
.btn-secondary{background:var(--surface);color:var(--text2);border-color:var(--border2)}
.btn-secondary:hover{background:var(--navy-pale);color:var(--navy)}
.btn-danger{background:var(--red-pale);color:var(--red);border-color:#f0b0b0}
.btn-danger:hover{background:#f8d0d0}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{background:var(--gold-dark)}
.btn-icon{width:26px;height:26px;border-radius:6px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.btn-icon:hover{background:var(--red-pale);color:var(--red)}
.w-full{width:100%;justify-content:center}

/* ── FILTER TABS ─────────────────────────────────────── */
.ftabs{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:3px;width:fit-content}
.ftab{padding:5px 12px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;white-space:nowrap}
.ftab.on{background:var(--surface);color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:600}

/* ── MODAL ───────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(27,42,74,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:var(--r2);width:100%;max-width:480px;box-shadow:var(--shadow2);transform:translateY(10px);transition:transform .25s;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-wide{max-width:680px}
.modal-head{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-size:15px;font-weight:600}
.modal-body{padding:14px 18px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface)}

/* ── TOAST ───────────────────────────────────────────── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:2000;transform:translateY(60px);opacity:0;transition:all .3s;max-width:320px;box-shadow:var(--shadow2)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-left:3px solid #4ade80}
.toast.warning{border-left:3px solid var(--gold)}
.toast.error{border-left:3px solid #f87171}
.toast.info{border-left:3px solid var(--teal)}

/* ── EMPTY STATE ─────────────────────────────────────── */
.empty{padding:28px 16px;text-align:center;color:var(--text3)}
.empty svg{width:30px;height:30px;margin:0 auto 8px;display:block;opacity:.3}
.empty-text{font-size:13px}

/* ── ARCHIVE STRIP ───────────────────────────────────── */
.archived-strip{padding:6px 12px;background:#F7F8FC;border-top:1px dashed var(--border);font-size:11px;color:var(--text3);text-align:center;cursor:pointer}
.archived-strip:hover{color:var(--navy)}

/* ── SCORE RING ──────────────────────────────────────── */
.score-card{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--r2);background:var(--surface);margin-bottom:8px}
.score-info{flex:1;min-width:0}
.score-name{font-size:13px;font-weight:600}
.score-role{font-size:10px;color:var(--text3);margin-bottom:6px}
.score-breakdown{display:flex;gap:8px;flex-wrap:wrap}
.score-metric{text-align:center}
.score-metric-val{font-size:13px;font-weight:700}
.score-metric-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.03em}

/* ── PORTAL STYLES ───────────────────────────────────── */
.portal-topbar{background:var(--navy);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.portal-tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--surface);padding:0 18px}
.ptab{padding:10px 14px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .15s}
.ptab.on{color:var(--navy);border-bottom-color:var(--navy);font-weight:600}
.portal-body{flex:1;overflow-y:auto;padding:16px 18px}
.login-wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#1a4a4a 100%)}
.login-card{background:var(--surface);border-radius:var(--r3);padding:32px 28px;width:100%;max-width:380px;box-shadow:var(--shadow2);text-align:center}
.va-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.va-sel-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:13px 8px;border-radius:var(--r2);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg)}
.va-sel-btn:hover{border-color:var(--teal);background:var(--teal-pale);transform:translateY(-2px);box-shadow:var(--shadow)}
.pin-row{display:flex;justify-content:center;gap:10px;margin:14px 0}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .2s}
.pin-dot.filled{background:var(--navy);border-color:var(--navy)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;max-width:200px;margin:0 auto 14px}
.pin-key{padding:12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font)}
.pin-key:hover{background:var(--navy-pale);border-color:var(--navy-mid)}
.pin-key:active{background:var(--navy);color:#fff;transform:scale(.95)}

/* ── INFO BOXES ──────────────────────────────────────── */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.info-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 12px}
.info-label{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.info-val{font-size:13px;font-weight:600}

/* ── CP HERO ─────────────────────────────────────────── */
.cp-hero{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:var(--r2);padding:22px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.cp-hero::before{content:'';position:absolute;right:-20px;top:-20px;width:130px;height:130px;border-radius:50%;background:rgba(201,168,76,.12)}
.cp-hero::after{content:'';position:absolute;right:40px;bottom:-30px;width:80px;height:80px;border-radius:50%;background:rgba(42,127,127,.15)}
.cp-hero-name{font-size:20px;font-weight:700;margin-bottom:3px;position:relative}
.cp-hero-sub{font-size:11px;color:rgba(255,255,255,.6);position:relative}
.cp-hero-tags{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;position:relative}
.cp-hero-tag{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(255,255,255,.12);color:#fff}
.cp-hero-health{position:absolute;right:22px;top:50%;transform:translateY(-50%);text-align:center}
.cp-hero-health-val{font-size:26px;font-weight:700;color:#fff}
.cp-hero-health-lbl{font-size:10px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.04em}

/* ── TIMER ───────────────────────────────────────────── */
.timer-display{font-size:34px;font-weight:700;color:var(--navy);text-align:center;letter-spacing:.06em;margin:10px 0;font-variant-numeric:tabular-nums}
.timer-btn-start{background:var(--teal);color:#fff;border:none;padding:9px 20px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.timer-btn-stop{background:var(--red);color:#fff;border:none;padding:9px 20px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.timer-btn-reset{background:var(--bg);color:var(--text2);border:1px solid var(--border2);padding:9px 20px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}

/* ── SEARCH ──────────────────────────────────────────── */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--text3)}
.search-input{width:100%;padding:8px 11px 8px 30px;border-radius:var(--r);border:1px solid var(--border2);font-size:13px;font-family:var(--font);color:var(--text);background:var(--surface);outline:none;transition:border .15s}
.search-input:focus{border-color:var(--teal)}

/* ── REPORT METRICS ──────────────────────────────────── */
.report-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.rmet{text-align:center;padding:8px;background:var(--bg);border-radius:var(--r)}
.rmet-val{font-size:16px;font-weight:700;color:var(--navy)}
.rmet-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}

/* ── FINANCE SUMMARY BOX ─────────────────────────────── */
.fin-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.fin-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:13px 14px}
.fin-box-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.fin-box-usd{font-size:18px;font-weight:700;color:var(--teal-dark);line-height:1.1}
.fin-box-php{font-size:11px;color:var(--text3);font-weight:500;margin-top:2px}
.fin-box-note{font-size:10px;color:var(--text3);margin-top:3px}

/* ── MOBILE ──────────────────────────────────────────── */
@media(max-width:680px){
  .sidebar{position:fixed;top:0;bottom:0;left:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:flex}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .pipeline{flex-direction:column}
  .pipe-col{min-width:unset}
  .content-area{padding:12px}
  .bottom-nav{display:block}
  .data-table th:nth-child(n+4),.data-table td:nth-child(n+4){display:none}

}
@media(min-width:681px){.bottom-nav{display:none!important}}

@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .22s ease forwards}

const lsKey = col => 'tjc_v3_' + col;

function lsLoad(col){
  try{
    const raw = localStorage.getItem(lsKey(col));
    if(raw) return JSON.parse(raw);
  }catch(e){}
  const seed = SEED[col] || [];
  localStorage.setItem(lsKey(col), JSON.stringify(seed));
  return Array.isArray(seed) ? seed : seed;
}

function lsSave(col, data){
  try{ localStorage.setItem(lsKey(col), JSON.stringify(data)); }catch(e){}
}

function loadConfig(){
  try{
    const raw = localStorage.getItem(lsKey('config'));
    if(raw){ const c=JSON.parse(raw); CFG.exchangeRate = c.exchangeRate || CFG.exchangeRate; }
    else lsSave('config', {exchangeRate: CFG.exchangeRate});
  }catch(e){}
}

function saveConfig(){
  lsSave('config', {exchangeRate: CFG.exchangeRate});
}

function loadAllData(){
  ['tasks','clients','timelogs','content','invoices','goals','team','events','activities'].forEach(col=>{
    APP.data[col] = lsLoad(col);
  });
  loadConfig();
}

function nid(col){
  const arr = APP.data[col]||[];
  const prefix = {tasks:'t',clients:'c',timelogs:'l',content:'x',invoices:'i',goals:'g',events:'e',team:'u',activities:'a'}[col]||'d';
  return prefix + Date.now();
}

function ts(){ return new Date().toISOString(); }

/* Core CRUD — mirrors Firestore API */
async function addDoc(col, data){
  const id = nid(col);
  const rec = {id, ...data, createdAt:ts(), createdBy: APP.user.uid};
  APP.data[col] = [rec, ...(APP.data[col]||[])];
  lsSave(col, APP.data[col]);
  logActivity(data._actIcon||'➕', data._actAction||'created', col, data._actRecord||id, data._actColor||'teal');
  renderCurrentPage(); updateSbBadges();
  return id;
}

async function updateDoc(col, id, data){
  const idx = APP.data[col].findIndex(x=>x.id===id);
  if(idx<0) return;
  APP.data[col][idx] = {...APP.data[col][idx], ...data, updatedAt:ts()};
  lsSave(col, APP.data[col]);
  if(data._actAction) logActivity(data._actIcon||'✏️', data._actAction, col, data._actRecord||id, data._actColor||'navy');
  renderCurrentPage(); updateSbBadges();
}

async function archiveDoc(col, id, recordName){
  await updateDoc(col, id, {archived:true, _actAction:'archived', _actRecord:recordName, _actIcon:'🗃️', _actColor:'amber'});
  toast(`${recordName} archived. You can restore it from the archive.`, 'warning');
}

async function restoreDoc(col, id, recordName){
  await updateDoc(col, id, {archived:false, _actAction:'restored', _actRecord:recordName, _actIcon:'↩️', _actColor:'green'});
  toast(`${recordName} restored!`, 'success');
}

   SECTION 6 — FINANCIAL ENGINE
────────────────────────────────────────────────────────── */
const FIN = {
  rate(){ return CFG.exchangeRate; },
  toPhp(usd){ return Math.round(usd * this.rate()); },
  toUsd(php){ return (php / this.rate()).toFixed(2); },
  fmt(usd, showBoth=true){
    const php = this.toPhp(usd);
    if(!showBoth) return `$${usd.toLocaleString()}`;
    return `<div class="dual-currency"><span class="dc-primary currency-usd">$${usd.toLocaleString()}</span><span class="dc-secondary">₱${php.toLocaleString()}</span></div>`;
  },
  fmtPhp(php, showBoth=true){
    const usd = (php / this.rate()).toFixed(0);
    if(!showBoth) return `₱${php.toLocaleString()}`;
    return `<div class="dual-currency"><span class="dc-primary currency-php">₱${php.toLocaleString()}</span><span class="dc-secondary">~$${Number(usd).toLocaleString()}</span></div>`;
  },
  clientMargin(c){
    const revPhp = c.rateUsd * this.rate();
    if(!revPhp) return null;
    const margin = ((revPhp - c.vaCostPhp) / revPhp) * 100;
    return Math.round(margin);
  },
  marginStatus(pct){
    if(pct===null) return 'none';
    if(pct >= CFG.marginTarget) return 'green';
    if(pct >= CFG.marginWarn) return 'yellow';
    return 'red';
  },
  marginBadge(pct){
    if(pct===null) return '';
    const s = this.marginStatus(pct);
    const cls = s==='green'?'mb-green':s==='yellow'?'mb-yellow':'mb-red';
    return `<span class="margin-badge ${cls}">${pct}% margin</span>`;
  },
  totalMrrUsd(){
    return APP.data.clients.filter(c=>c.status==='Active').reduce((a,c)=>a+(c.rateUsd||0),0);
  },
  totalVaCostPhp(){
    return APP.data.clients.filter(c=>c.status==='Active').reduce((a,c)=>a+(c.vaCostPhp||0),0);
  },
  netProfitPhp(){
    const rev = this.totalMrrUsd() * this.rate();
    const cost = this.totalVaCostPhp();
    return rev - cost;
  },
  avgMargin(){
    const active = APP.data.clients.filter(c=>c.status==='Active'&&c.rateUsd>0);
    if(!active.length) return 0;
    const total = active.reduce((a,c)=>a+(this.clientMargin(c)||0),0);
    return Math.round(total/active.length);
  }
};

/* ──────────────────────────────────────────────────────────
   SECTION 7 — CAPACITY ENGINE
────────────────────────────────────────────────────────── */
const CAP = {
  status(pct){
    if(pct>=CFG.capacityMax) return 'overload';
    if(pct>=CFG.capacityWarn) return 'warning';
    return 'ok';
  },
  color(pct){
    const s=this.status(pct);
    return s==='overload'?'var(--red)':s==='warning'?'var(--gold)':'var(--teal)';
  },
  textColor(pct){
    const s=this.status(pct);
    return s==='overload'?'var(--red)':s==='warning'?'var(--gold-dark)':'var(--teal-dark)';
  },
  canAssign(vaId){
    const va = APP.data.team.find(v=>v.id===vaId);
    return va && (va.capacity||0) < CFG.capacityMax;
  },
  overloaded(){ return APP.data.team.filter(v=>v.role==='va'&&(v.capacity||0)>=CFG.capacityMax); },
  nearLimit(){ return APP.data.team.filter(v=>v.role==='va'&&(v.capacity||0)>=CFG.capacityWarn&&(v.capacity||0)<CFG.capacityMax); }
};

/* ──────────────────────────────────────────────────────────
   SECTION 8 — KPI ENGINE
────────────────────────────────────────────────────────── */
const KPI = {
  score(va){
    if(!va.kpi) return 0;
    const {completionRate=0,slaCompliance=0,errorRate=0,satisfaction=0} = va.kpi;
    return Math.round(
      completionRate * 0.40 +
      slaCompliance  * 0.35 +
      (100 - errorRate) * 0.15 +
      (satisfaction / 5) * 100 * 0.10
    );
  },
  tier(score){
    if(score>=90) return 'Vanguard';
    if(score>=75) return 'Cornerstone';
    return 'Waypoint';
  },
  tierClass(score){
    if(score>=90) return 'tier-vanguard';
    if(score>=75) return 'tier-cornerstone';
    return 'tier-waypoint';
  },
  tierColor(score){
    if(score>=90) return 'var(--gold)';
    if(score>=75) return 'var(--teal)';
    return 'var(--navy)';
  }
};

/* ──────────────────────────────────────────────────────────
   SECTION 9 — SLA ENGINE
────────────────────────────────────────────────────────── */
const SLA = {
  slaMs: CFG.slaHours * 3600 * 1000,
  check(task){
    if(!task.createdAt) return 'ok';
    const created = new Date(task.createdAt).getTime();
    const responded = task.firstResponseAt ? new Date(task.firstResponseAt).getTime() : Date.now();
    const elapsed = responded - created;
    if(elapsed > this.slaMs) return 'breach';
    if(elapsed > this.slaMs * 0.75) return 'warn';
    return 'ok';
  },
  elapsed(task){
    if(!task.createdAt) return 0;
    const created = new Date(task.createdAt).getTime();
    const end = task.firstResponseAt ? new Date(task.firstResponseAt).getTime() : Date.now();
    return (end - created) / 3600000; // hours
  },
  badge(task){
    const status = this.check(task);
    if(task.done||task.firstResponseAt){
      const h = this.elapsed(task).toFixed(1);
      return status==='breach'
        ? `<span class="sla-badge sla-breach">⚠ ${h}h</span>`
        : `<span class="sla-badge sla-ok">✓ ${h}h</span>`;
    }
    const h = ((Date.now()-new Date(task.createdAt).getTime())/3600000).toFixed(1);
    return status==='breach'
      ? `<span class="sla-badge sla-breach">BREACH ${h}h</span>`
      : status==='warn'
      ? `<span class="sla-badge sla-warn">${h}h</span>`
      : `<span class="sla-badge sla-ok">${h}h</span>`;
  },
  complianceRate(tasks){
    const tracked = tasks.filter(t=>t.createdAt);
    if(!tracked.length) return 100;
    const compliant = tracked.filter(t=>this.check(t)!=='breach');
    return Math.round((compliant.length/tracked.length)*100);
  },
  vaRate(vaUid){
    const vaTasks = APP.data.tasks.filter(t=>t.assigneeUid===vaUid&&!t.archived);
    return this.complianceRate(vaTasks);
  }
};

/* ──────────────────────────────────────────────────────────
   SECTION 10 — HEALTH SCORE ENGINE
────────────────────────────────────────────────────────── */
const HEALTH = {
  compute(c){
    if(!['Active','Onboarding'].includes(c.status)) return c.healthScore||0;
    const invoices = APP.data.invoices.filter(i=>i.clientId===c.id&&!i.archived);
    const hasOverdue = invoices.some(i=>i.status==='Overdue');
    const paymentScore = hasOverdue ? 40 : 100;
    const slaTasks = APP.data.tasks.filter(t=>t.clientId===c.id&&!t.archived);
    const slaScore = SLA.complianceRate(slaTasks);
    const doneTasks = slaTasks.filter(t=>t.done).length;
    const completionScore = slaTasks.length ? Math.round((doneTasks/slaTasks.length)*100) : 100;
    const daysSinceContact = c.lastContact ? Math.floor((Date.now()-new Date(c.lastContact).getTime())/86400000) : 99;
    const recencyScore = daysSinceContact<=3?100:daysSinceContact<=7?80:daysSinceContact<=14?60:30;
    return Math.round(paymentScore*0.30 + slaScore*0.25 + completionScore*0.25 + recencyScore*0.20);
  },
  risk(score){
    if(score>=75) return 'low';
    if(score>=50) return 'medium';
    return 'high';
  },
  riskTag(score){
    const r=this.risk(score);
    return r==='low'?`<span class="tag t-green">Low Risk</span>`:r==='medium'?`<span class="tag t-amber">Medium Risk</span>`:`<span class="tag t-red">High Risk</span>`;
  },
  color(score){
    if(score>=75) return 'var(--green)';
    if(score>=50) return 'var(--gold)';
    return 'var(--red)';
  },
  ring(score){
    const c=110; const r=24; const circ=2*Math.PI*r;
    const offset = circ - (score/100)*circ;
    const col = this.color(score);
    return `<div class="health-ring"><svg viewBox="0 0 56 56"><circle class="track" cx="28" cy="28" r="${r}"/><circle class="fill" cx="28" cy="28" r="${r}" stroke="${col}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/></svg><div class="health-val" style="color:${col}">${score}</div></div>`;
  }
};

    };

  },
  guard(action, cb){
    if(!this.can(action)){ toast('You do not have permission for this action.','error'); return false; }
    if(cb) cb(); return true;
  }
};

/* ──────────────────────────────────────────────────────────
   SECTION 16 — KPI & PERFORMANCE
────────────────────────────────────────────────────────── */
function renderKPI(){
  const vas = APP.data.team.filter(v=>v.role!=='owner');
  const avgScore = vas.length ? Math.round(vas.reduce((a,v)=>a+KPI.score(v),0)/vas.length) : 0;
  const vanguard = vas.filter(v=>KPI.score(v)>=90);
  const cornerstone = vas.filter(v=>KPI.score(v)>=75&&KPI.score(v)<90);
  const waypoint = vas.filter(v=>KPI.score(v)<75);

  return `
  <div class="kpi-grid">
    <div class="kpi-card" style="border-left-color:var(--gold)">
      <div class="kpi-label">Avg KPI Score</div>
      <div class="kpi-val" style="color:${KPI.tierColor(avgScore)}">${avgScore}</div>
      <div class="kpi-sub">${KPI.tier(avgScore)} team</div>
    </div>
    <div class="kpi-card" style="border-left-color:var(--gold)">
      <div class="kpi-label">🏆 Vanguard (90–100)</div>
      <div class="kpi-val" style="color:var(--gold-dark)">${vanguard.length}</div>
      <div class="kpi-sub">${vanguard.map(v=>v.displayName.split(' ')[0]).join(', ')||'—'}</div>
    </div>
    <div class="kpi-card" style="border-left-color:var(--teal)">
      <div class="kpi-label">⚡ Cornerstone (75–89)</div>
      <div class="kpi-val" style="color:var(--teal-dark)">${cornerstone.length}</div>
      <div class="kpi-sub">${cornerstone.map(v=>v.displayName.split(' ')[0]).join(', ')||'—'}</div>
    </div>
    <div class="kpi-card" style="border-left-color:var(--navy)">
      <div class="kpi-label">📍 Waypoint (&lt;75)</div>
      <div class="kpi-val" style="color:var(--navy)">${waypoint.length}</div>
      <div class="kpi-sub">${waypoint.map(v=>v.displayName.split(' ')[0]).join(', ')||'—'}</div>
    </div>
  </div>

  <div class="sec-head"><div class="sec-title">Individual Performance</div></div>
  ${vas.map(va=>{
    const score = KPI.score(va);
    const k = va.kpi||{};
    const slaRate = SLA.vaRate(va.id);
    const circumference = 2*Math.PI*20;
    const offset = circumference - (score/100)*circumference;
    const col = KPI.tierColor(score);
    return `<div class="score-card" style="margin-bottom:10px">
      <svg viewBox="0 0 48 48" width="48" height="48" style="flex-shrink:0;transform:rotate(-90deg)">
        <circle cx="24" cy="24" r="20" fill="none" stroke="var(--border)" stroke-width="5"/>
        <circle cx="24" cy="24" r="20" fill="none" stroke="${col}" stroke-width="5" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
      </svg>
      <div style="position:absolute;left:0;display:none">${score}</div>
      <div class="av av-md ${avColor(va.avatarColor)}">${va.initials}</div>
      <div class="score-info">
        <div class="score-name">${va.displayName}</div>
        <div class="score-role">${va.role==='va'?'Virtual Assistant':va.role} · <span style="font-size:13px;font-weight:700;color:${col}">${score}/100</span> · <span class="${KPI.tierClass(score)}">${KPI.tier(score)}</span></div>
        <div class="score-breakdown">
          <div class="score-metric"><div class="score-metric-val" style="color:var(--teal)">${k.completionRate||0}%</div><div class="score-metric-lbl">Completion</div></div>
          <div class="score-metric"><div class="score-metric-val" style="color:${slaRate>=90?'var(--green)':slaRate>=75?'var(--gold-dark)':'var(--red)'}">${slaRate}%</div><div class="score-metric-lbl">SLA Rate</div></div>
          <div class="score-metric"><div class="score-metric-val" style="color:${(k.errorRate||0)<=3?'var(--green)':'var(--red)'}">${k.errorRate||0}%</div><div class="score-metric-lbl">Error Rate</div></div>
          <div class="score-metric"><div class="score-metric-val" style="color:var(--gold-dark)">${k.satisfaction||0}/5 ⭐</div><div class="score-metric-lbl">Satisfaction</div></div>
        </div>
      </div>
      <button class="btn btn-sm btn-secondary" onclick="openUpdateKPI('${va.id}')">Update KPI</button>
    </div>`;
  }).join('')}

  <div style="margin-top:20px;padding:14px 16px;background:var(--navy-pale);border-radius:var(--r2);font-size:12px;color:var(--navy)">
    <strong>KPI Scoring Formula:</strong> Completion Rate (40%) + SLA Compliance (35%) + Error-free Rate (15%) + Client Satisfaction (10%)<br>
    <span style="color:var(--text3)">Scores are computed automatically. Update raw metrics via the "Update KPI" button on each VA.</span>
  </div>`;
}

/* ──────────────────────────────────────────────────────────
   SECTION 17 — SLA TRACKER
────────────────────────────────────────────────────────── */
function renderSLA(){
  const tasks = APP.data.tasks.filter(t=>!t.archived&&t.createdAt);
  const breached = tasks.filter(t=>SLA.check(t)==='breach');
  const warned = tasks.filter(t=>SLA.check(t)==='warn');
  const compliant = tasks.filter(t=>SLA.check(t)==='ok');
  const rate = SLA.complianceRate(tasks);
  const vas = APP.data.team.filter(v=>v.role!=='owner');

  return `
  <div class="kpi-grid">
    <div class="kpi-card" style="border-left-color:${rate>=90?'var(--green)':rate>=75?'var(--gold)':'var(--red)'}">
      <div class="kpi-label">Overall SLA Rate</div>
      <div class="kpi-val" style="color:${rate>=90?'var(--green)':rate>=75?'var(--gold-dark)':'var(--red)'}">${rate}%</div>
      <div class="kpi-sub">Target: 100% within ${CFG.slaHours}h</div>
    </div>
    <div class="kpi-card" style="border-left-color:var(--green)">
      <div class="kpi-label">Compliant Tasks</div>
      <div class="kpi-val" style="color:var(--green)">${compliant.length}</div>
      <div class="kpi-sub">Within ${CFG.slaHours}h response</div>
    </div>
    <div class="kpi-card" style="border-left-color:var(--gold)">
      <div class="kpi-label">At Risk (&gt;75% of window)</div>
      <div class="kpi-val" style="color:var(--gold-dark)">${warned.length}</div>
      <div class="kpi-sub">Approaching SLA limit</div>
    </div>
    <div class="kpi-card" style="border-left-color:var(--red)">
      <div class="kpi-label">SLA Breaches</div>
      <div class="kpi-val" style="color:${breached.length?'var(--red)':'var(--green)'}">${breached.length}</div>
      <div class="kpi-sub">${breached.length?'Action required':'None ✓'}</div>
    </div>
  </div>

  ${breached.length>0?`<div class="cap-warning over" style="margin-bottom:14px">⚠ ${breached.length} task${breached.length>1?'s have':' has'} breached the ${CFG.slaHours}-hour SLA. Follow up immediately.</div>`:''}

  <!-- SLA BY VA -->
  <div class="sec-head"><div class="sec-title">SLA Compliance by VA</div></div>
  <div class="card" style="margin-bottom:18px">
    <table class="data-table">
      <thead><tr><th>VA</th><th>Tasks Tracked</th><th>Compliant</th><th>Breached</th><th>Rate</th><th>Status</th></tr></thead>
      <tbody>
        ${vas.map(va=>{
          const vaTasks = tasks.filter(t=>t.assigneeUid===va.id);
          const vaBreach = vaTasks.filter(t=>SLA.check(t)==='breach');
          const vaRate = SLA.complianceRate(vaTasks);
          return `<tr>
            <td><div style="display:flex;align-items:center;gap:6px"><div class="av av-xs ${avColor(va.avatarColor)}">${va.initials}</div>${va.displayName}</div></td>
            <td>${vaTasks.length}</td>
            <td style="color:var(--green);font-weight:600">${vaTasks.filter(t=>SLA.check(t)==='ok').length}</td>
            <td style="color:${vaBreach.length?'var(--red)':'var(--text3)'};font-weight:600">${vaBreach.length}</td>
            <td><strong style="color:${vaRate>=90?'var(--green)':vaRate>=75?'var(--gold-dark)':'var(--red)'}">${vaRate}%</strong></td>
            <td><span class="tag ${vaRate>=90?'t-green':vaRate>=75?'t-amber':'t-red'}">${vaRate>=90?'Excellent':vaRate>=75?'Good':'Needs Work'}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>

  <!-- BREACH LIST -->
  ${breached.length>0?`
  <div class="sec-head"><div class="sec-title" style="color:var(--red)">⚠ SLA Breaches — Immediate Action Required</div></div>
  <div class="card" style="border-color:var(--red)">
    ${breached.map(t=>`
    <div class="task-row overdue-row" onclick="openTaskDetail('${t.id}')">
      <div class="chk${t.done?' done':''}"></div>
      <span class="task-name">${t.title}</span>
      <div class="task-meta">
        ${t.assigneeInitials?`<div class="av av-xs ${avColor(t.assigneeColor)}">${t.assigneeInitials}</div>`:''}
        ${SLA.badge(t)}
        <span style="font-size:10px;color:var(--red);font-weight:600">BREACH: ${SLA.elapsed(t).toFixed(1)}h</span>
      </div>
    </div>`).join('')}
  </div>`:''}

  <!-- ALL TASKS WITH SLA -->
  <div class="sec-head" style="margin-top:18px"><div class="sec-title">All Tasks with SLA Status</div></div>
  <div class="card">
    ${tasks.slice(0,20).map(t=>`
    <div class="task-row" onclick="openTaskDetail('${t.id}')">
      <div class="chk${t.done?' done':''}"></div>
      <span class="task-name${t.done?' done':''}">${t.title}</span>
      <div class="task-meta">
        ${t.assigneeInitials?`<div class="av av-xs ${avColor(t.assigneeColor)}">${t.assigneeInitials}</div>`:''}
        ${SLA.badge(t)}
        <span style="font-size:10px;color:var(--text3)">${t.project||'—'}</span>
      </div>
    </div>`).join('')}
  </div>`;
}

/* ──────────────────────────────────────────────────────────
   SECTION 18 — CLIENT HEALTH
────────────────────────────────────────────────────────── */
function renderClientHealth(){
  const active = APP.data.clients.filter(c=>['Active','Onboarding'].includes(c.status)&&!c.archived);
  const scores = active.map(c=>({...c, computedHealth:HEALTH.compute(c)}));
  scores.sort((a,b)=>a.computedHealth-b.computedHealth);
  const avgHealth = scores.length ? Math.round(scores.reduce((a,c)=>a+c.computedHealth,0)/scores.length) : 0;
  const highRisk = scores.filter(c=>HEALTH.risk(c.computedHealth)==='high');
  const medRisk = scores.filter(c=>HEALTH.risk(c.computedHealth)==='medium');
  const lowRisk = scores.filter(c=>HEALTH.risk(c.computedHealth)==='low');

  return `
  <div class="kpi-grid">
    <div class="kpi-card" style="border-left-color:${avgHealth>=75?'var(--green)':avgHealth>=50?'var(--gold)':'var(--red)'}">
      <div class="kpi-label">Avg Health Score</div>
      <div class="kpi-val" style="color:${HEALTH.color(avgHealth)}">${avgHealth}</div>
      <div class="kpi-sub">Across ${active.length} active clients</div>
    </div>
    <div class="kpi-card" style="border-left-color:var(--green)">
      <div class="kpi-label">Low Risk (75–100)</div>
      <div class="kpi-val" style="color:var(--green)">${lowRisk.length}</div>
      <div class="kpi-sub">Healthy relationships</div>
    </div>
    <div class="kpi-card" style="border-left-color:var(--gold)">
      <div class="kpi-label">Medium Risk (50–74)</div>
      <div class="kpi-val" style="color:var(--gold-dark)">${medRisk.length}</div>
      <div class="kpi-sub">Needs attention</div>
    </div>
    <div class="kpi-card" style="border-left-color:var(--red)">
      <div class="kpi-label">High Risk (&lt;50)</div>
      <div class="kpi-val" style="color:${highRisk.length?'var(--red)':'var(--green)'}">${highRisk.length}</div>
      <div class="kpi-sub">${highRisk.length?'At risk of churn':'None ✓'}</div>
    </div>
  </div>

  ${highRisk.length>0?`<div class="cap-warning over" style="margin-bottom:14px">⚠ <strong>${highRisk.map(c=>c.name).join(', ')}</strong> ${highRisk.length===1?'is':'are'} at high churn risk. Schedule check-ins immediately.</div>`:''}

  <div class="sec-head"><div class="sec-title">Client Health Scores</div></div>
  ${scores.map(c=>{
    const h = c.computedHealth;
    const invs = APP.data.invoices.filter(i=>i.clientId===c.id&&!i.archived);
    const hasOverdue = invs.some(i=>i.status==='Overdue');
    const cTasks = APP.data.tasks.filter(t=>t.clientId===c.id&&!t.archived);
    const slaR = SLA.complianceRate(cTasks);
    const done = cTasks.filter(t=>t.done).length;
    const compR = cTasks.length?Math.round((done/cTasks.length)*100):100;
    const days = c.lastContact ? Math.floor((Date.now()-new Date(c.lastContact).getTime())/86400000) : 99;
    return `<div class="card card-pad" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:14px">
        ${HEALTH.ring(h)}
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:14px;font-weight:600">${c.name}</span>
            ${HEALTH.riskTag(h)}
            <span class="tag ${statusTag(c.status)}">${c.status}</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px">
            <div style="text-align:center;padding:6px;background:var(--bg);border-radius:var(--r)">
              <div style="font-size:13px;font-weight:700;color:${hasOverdue?'var(--red)':'var(--green)'}">${hasOverdue?'⚠':'✓'}</div>
              <div style="font-size:9px;color:var(--text3);text-transform:uppercase">Payment</div>
            </div>
            <div style="text-align:center;padding:6px;background:var(--bg);border-radius:var(--r)">
              <div style="font-size:13px;font-weight:700;color:${slaR>=90?'var(--green)':slaR>=75?'var(--gold-dark)':'var(--red)'}">${slaR}%</div>
              <div style="font-size:9px;color:var(--text3);text-transform:uppercase">SLA</div>
            </div>
            <div style="text-align:center;padding:6px;background:var(--bg);border-radius:var(--r)">
              <div style="font-size:13px;font-weight:700;color:${compR>=80?'var(--green)':'var(--amber)'}">${compR}%</div>
              <div style="font-size:9px;color:var(--text3);text-transform:uppercase">Tasks Done</div>
            </div>
            <div style="text-align:center;padding:6px;background:var(--bg);border-radius:var(--r)">
              <div style="font-size:13px;font-weight:700;color:${days<=7?'var(--green)':days<=14?'var(--amber)':'var(--red)'}">${days}d</div>
              <div style="font-size:9px;color:var(--text3);text-transform:uppercase">Last Contact</div>
            </div>
          </div>
        </div>
        <button class="btn btn-sm btn-secondary" onclick="openClientPortal('${c.id}')">View →</button>
      </div>
    </div>`;
  }).join('')||emptyState('No active clients to assess.')}

  <div style="margin-top:16px;padding:12px 14px;background:var(--navy-pale);border-radius:var(--r2);font-size:12px;color:var(--navy)">
    <strong>Health Score Formula:</strong> Payment Status (30%) + SLA Compliance (25%) + Task Completion (25%) + Contact Recency (20%)
  </div>`;
}

   SECTION 19 — ACTIVITY LOG
────────────────────────────────────────────────────────── */

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div style="font-size:13px;color:var(--text2)">${acts.length} total actions logged</div>

  <div class="card">
    ${acts.length?acts.map(a=>activityItemHtml(a,true)).join('')||emptyState('No activity logged yet.'):emptyState('No activity logged yet.')}

function activityItemHtml(a, full=false){
  const colors = {teal:'var(--teal-pale)',green:'var(--green-pale)',gold:'var(--gold-pale)',navy:'var(--navy-pale)',amber:'var(--amber-pale)',red:'var(--red-pale)',purple:'var(--purple-pale)'};
  const iconBg = colors[a.color]||'var(--navy-pale)';
  const d = new Date(a.ts);
  const timeStr = d.toLocaleString('en-PH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  return `<div class="activity-item">
    <div class="activity-icon" style="background:${iconBg}">${a.icon||'•'}</div>
    <div class="activity-body">
      <div class="activity-action"><strong>${a.user}</strong> ${a.action} <span style="color:var(--navy);font-weight:500">${a.record}</span></div>
      <div class="activity-meta">${timeStr} · ${a.type||'system'}</div>
    </div>
  </div>`;
}

/* ──────────────────────────────────────────────────────────
   SECTION 20 — CLIENTS / PIPELINE
────────────────────────────────────────────────────────── */
function renderClients(){
  const stages = ['Lead','Proposal','Onboarding','Active','Completed'];
  const colors = {Lead:'var(--navy)',Proposal:'var(--gold)',Onboarding:'var(--teal)',Active:'var(--teal)',Completed:'var(--green)'};
  const bg = {Lead:'var(--navy-pale)',Proposal:'var(--gold-pale)',Onboarding:'var(--teal-pale)',Active:'var(--teal-pale)',Completed:'var(--green-pale)'};

        </div>
        ${cols.map(c=>{
          const margin = FIN.clientMargin(c);
          const ms = FIN.marginStatus(margin);

            <div class="pipe-card-name">${c.name}</div>
            <div class="pipe-card-meta">${c.package}${!c.rateUsd?' · TBD':''}</div>
            ${c.rateUsd?`<div class="pipe-card-rate" style="color:${colors[stage]}">$${c.rateUsd}/mo · ₱${FIN.toPhp(c.rateUsd).toLocaleString()}</div>`:''}
            ${margin!==null?`<div class="pipe-card-margin">${FIN.marginBadge(margin)}</div>`:''}
            <div style="display:flex;align-items:center;justify-content:space-between;padding-left:7px">
              <div style="display:flex;align-items:center;gap:3px">
                <div class="av av-xs ${avColor(c.assignedVaColor||'navy')}">${c.assignedVaInitials||'?'}</div>
                <span style="font-size:10px;color:var(--text3)">${(c.assignedVa||'').split(' ')[0]}</span>
              </div>
              ${c.oosCount?`<span class="oos-badge">${c.oosCount} OOS</span>`:''}
            </div>
          </div>`;
        }).join('')}
        <div class="pipe-add" onclick="openAddClientInStage('${stage}')">+ Add</div>
      </div>`;
    }).join('')}
  </div>

  <div class="sec-head"><div class="sec-title">All Clients</div></div>
  <div class="card">
    <table class="data-table">
      <colgroup><col style="width:20%"><col style="width:8%"><col style="width:8%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:8%"><col style="width:8%"><col style="width:8%"></colgroup>

      <tbody>
        ${clients.map(c=>{
          const margin = FIN.clientMargin(c);
          const h = HEALTH.compute(c);
          return `<tr onclick="openClientPortal('${c.id}')">
            <td style="font-weight:600">${c.name}${c.archived?` <span class="tag t-gray" style="font-size:9px">archived</span>`:''}</td>
            <td><span class="tag ${statusTag(c.status)}">${c.status}</span></td>
            <td>${c.package}</td>
            <td><div class="dual-currency"><span class="dc-primary currency-usd" style="font-size:12px">$${c.rateUsd||0}</span><span class="dc-secondary">₱${FIN.toPhp(c.rateUsd||0).toLocaleString()}</span></div></td>
            <td style="font-size:12px;color:var(--red)">₱${c.vaCostPhp.toLocaleString()}</td>
            <td>${FIN.marginBadge(margin)}</td>
            <td><div style="display:flex;align-items:center;gap:4px"><div class="av av-xs ${avColor(c.assignedVaColor||'navy')}">${c.assignedVaInitials||'?'}</div></div></td>
            <td><span style="font-size:12px;font-weight:700;color:${HEALTH.color(h)}">${h||'—'}</span></td>

/* ──────────────────────────────────────────────────────────
   SECTION 21 — TASKS
────────────────────────────────────────────────────────── */
let taskFilter = 'open';
function renderTasks(){
  const td = today();
  const all = APP.data.tasks.filter(t=>!t.archived||(APP.showArchived&&t.archived));
  const filters = {
    all, today:all.filter(t=>t.dueDate===td),
    open:all.filter(t=>!t.done),
    overdue:all.filter(t=>!t.done&&t.dueDate&&t.dueDate<td),
    done:all.filter(t=>t.done),
    oos:all.filter(t=>t.isOos)
  };
  const shown = filters[taskFilter]||all;
  const oosValue = APP.data.tasks.filter(t=>t.isOos&&!t.archived).reduce((a,t)=>a+(t.oosValue||0),0);

  return `
  <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
    <div class="ftabs">
      ${Object.keys(filters).map(f=>`<div class="ftab${taskFilter===f?' on':''}" onclick="taskFilter='${f}';renderCurrentPage()">${f.charAt(0).toUpperCase()+f.slice(1)} <span style="opacity:.6">(${filters[f].length})</span></div>`).join('')}
    </div>
    <button class="btn btn-sm btn-primary" onclick="openAddTask()">+ Add Task</button>
    ${oosValue>0?`<span class="oos-badge" style="padding:3px 8px;font-size:11px">OOS upsell opportunity: $${oosValue.toLocaleString()}</span>`:''}
  </div>
  <div class="card">
    <table class="data-table">
      <colgroup><col style="width:30px"><col><col style="width:80px"><col style="width:60px"><col style="width:80px"><col style="width:80px"><col style="width:60px"><col style="width:30px"></colgroup>
      <thead><tr><th></th><th>Task</th><th>Assignee</th><th>Priority</th><th>Due Date</th><th>Project</th><th>SLA</th><th></th></tr></thead>
      <tbody>
        ${shown.map(t=>{
          const td2=today();const late=t.dueDate&&t.dueDate<td2&&!t.done;
          return `<tr style="background:${late?'#FFF8F8':''}${t.isOos?';border-left:3px solid var(--purple)':''}" onclick="openTaskDetail('${t.id}')">
            <td onclick="event.stopPropagation();toggleTask('${t.id}')"><div class="chk${t.done?' done':''}"></div></td>
            <td style="font-weight:${t.done?400:500}" class="${t.done?'task-name done':''}">${t.isOos?`<span class="oos-badge">OOS</span> `:''}${t.title}</td>
            <td><div style="display:flex;align-items:center;gap:4px">${t.assigneeInitials?`<div class="av av-xs ${avColor(t.assigneeColor)}">${t.assigneeInitials}</div>`:''}<span style="font-size:11px">${(t.assigneeName||'').split(' ')[0]||'—'}</span></div></td>
            <td>${tagHtml(t.priority)}</td>
            <td style="font-size:11px;color:${late?'var(--red)':'var(--text3)';}">${late?'⚠ Overdue':t.dueDate||'—'}</td>
            <td style="font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis">${t.project||'—'}</td>
            <td>${SLA.badge(t)}</td>
            <td onclick="event.stopPropagation()"><button class="btn-icon" onclick="archiveDoc('tasks','${t.id}','${t.title.slice(0,30)}')" style="opacity:0" onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0">🗃</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    ${shown.length===0?emptyState('No tasks in this view.'):''}
  </div>`;
}

/* ──────────────────────────────────────────────────────────
   SECTION 22 — CONTENT
────────────────────────────────────────────────────────── */
function renderContent(){
  const pending = APP.data.content.filter(c=>c.status==='pending'&&!c.archived);
  const approved = APP.data.content.filter(c=>c.status==='approved'&&!c.archived);
  const revision = APP.data.content.filter(c=>c.status==='revision'&&!c.archived);
  return `
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
    <span class="tag t-red">${pending.length} Pending</span>
    <span class="tag t-green">${approved.length} Approved</span>
    <span class="tag t-amber">${revision.length} Revision</span>
    <button class="btn btn-sm btn-primary" style="margin-left:auto" onclick="openAddContent()">+ Add Content</button>
  </div>
  ${pending.length?`<div class="sec-head"><div class="sec-title" style="color:var(--red)">Pending Approval</div></div>${pending.map(c=>approvalCardHtml(c)).join('')}`:''}
  ${revision.length?`<div class="sec-head" style="margin-top:14px"><div class="sec-title" style="color:var(--amber)">Revision Requested</div></div>${revision.map(c=>approvalCardHtml(c,true)).join('')}`:''}
  ${approved.length?`<div class="sec-head" style="margin-top:14px"><div class="sec-title" style="color:var(--green)">Approved</div></div>${approved.map(c=>`
    <div class="card card-pad" style="margin-bottom:8px;opacity:.8;border-left:3px solid var(--green)">
      <div style="font-size:13px;font-weight:600">${c.title}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:3px"><div class="av av-xs ${avColor(c.vaColor||'navy')}" style="display:inline-flex;margin-right:4px">${c.vaInitials}</div>${c.vaName} · ${c.platform} <span class="tag t-green" style="margin-left:4px">Approved ✓</span></div>
    </div>`).join('')}`:''}
  ${pending.length===0&&revision.length===0?`<div class="card card-pad" style="text-align:center;color:var(--green);font-weight:600;font-size:14px;padding:24px">✓ All content reviewed!</div>`:''}`;
}

function approvalCardHtml(c, isRevision=false){
  return `<div class="card card-pad" id="apv-${c.id}" style="margin-bottom:8px${isRevision?';border-left:3px solid var(--gold)':''}">
    <div style="font-size:13px;font-weight:600;margin-bottom:4px">${c.title}</div>
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);margin-bottom:8px;flex-wrap:wrap">
      <div class="av av-xs ${avColor(c.vaColor||'navy')}">${c.vaInitials||'?'}</div>
      ${c.vaName} · ${c.platform}
      <span class="tag ${c.urgency==='red'?'t-red':c.urgency==='amber'?'t-amber':'t-gray'}">${c.dueLabel}</span>
      ${isRevision?`<span class="tag t-amber">Revision Requested</span>`:''}
    </div>
    <div style="display:flex;gap:5px">
      <button class="btn btn-xs" style="background:var(--green-pale);color:var(--green);border:1px solid #a7d9bb" onclick="approveContent('${c.id}')">✓ Approve</button>
      <button class="btn btn-xs btn-secondary" onclick="reviseContent('${c.id}')">↩ Revision</button>
      <button class="btn btn-xs btn-secondary" style="margin-left:auto" onclick="archiveDoc('content','${c.id}','${c.title.slice(0,30)}')">🗃</button>
    </div>
  </div>`;
}

      <div class="dual-currency" style="text-align:right;min-width:90px">
        <span class="dc-primary currency-usd" style="font-size:13px">$${inv.amountUsd.toLocaleString()}</span>
        <span class="dc-secondary">₱${FIN.toPhp(inv.amountUsd).toLocaleString()}</span>
      </div>
      ${inv.status!=='Paid'?`<button class="btn btn-xs" style="background:var(--green-pale);color:var(--green);border:1px solid #a7d9bb;flex-shrink:0" onclick="event.stopPropagation();markPaid('${inv.id}')">Mark Paid</button>`:
        `<span style="font-size:10px;color:var(--green);font-weight:600;flex-shrink:0;min-width:60px">✓ ${inv.paidAt}</span>`}
      <button class="btn-icon" onclick="event.stopPropagation();archiveDoc('invoices','${inv.id}','${inv.number}')" style="opacity:0" onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0">🗃</button>

            <div style="text-align:center;background:var(--bg);padding:7px;border-radius:var(--r)">
              <div style="font-size:15px;font-weight:700;color:var(--navy)">${APP.data.clients.filter(c=>c.assignedVaUid===va.id&&c.status==='Active').length}</div>
              <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.03em">Clients</div>
            </div>
            <div style="text-align:center;background:var(--bg);padding:7px;border-radius:var(--r)">
              <div style="font-size:15px;font-weight:700;color:${CAP.textColor(cap)}">${cap}%</div>
              <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.03em">Capacity</div>
            </div>
            <div style="text-align:center;background:var(--bg);padding:7px;border-radius:var(--r)">

          <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">
            ${(va.skills||[]).map(s=>`<span class="tag t-navy" style="font-size:9px">${s}</span>`).join('')}

/* ──────────────────────────────────────────────────────────
   SECTION 25 — GOALS
────────────────────────────────────────────────────────── */
function renderGoals(){

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">

          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:14px;font-weight:700;color:${col}">${pct}%</span>
            <button class="btn btn-xs btn-secondary" onclick="openUpdateGoal('${g.id}')">Update</button>
            <button class="btn-icon" onclick="archiveDoc('goals','${g.id}','${g.name.slice(0,30)}')" style="font-size:12px">🗃</button>
          </div>
        </div>
        <div class="prog-lg"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>

/* ──────────────────────────────────────────────────────────
   SECTION 26 — ONBOARDING TRACKER
────────────────────────────────────────────────────────── */
const OB_STEPS = ['Contract Signed','Payment Received','Intake Form Sent','Intake Form Received','Kickoff Call Scheduled','Kickoff Call Done','Access Granted & Fully Onboarded'];

function renderOnboarding(){
  const onboarding = APP.data.clients.filter(c=>['Onboarding','Active'].includes(c.status)&&!c.archived);
  return `
  <div style="margin-bottom:14px;font-size:13px;color:var(--text2)">${onboarding.filter(c=>!c.onboardingDone).length} client(s) actively onboarding · ${onboarding.filter(c=>c.onboardingDone).length} fully onboarded</div>
  ${onboarding.map(c=>{
    const step = c.onboardingStep||0;
    const pct = Math.round((step/OB_STEPS.length)*100);
    return `<div class="card" style="margin-bottom:14px">
      <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="av av-md ${avColor(c.assignedVaColor)}">${c.assignedVaInitials}</div>
          <div><div style="font-size:14px;font-weight:600">${c.name}</div>
          <div style="font-size:11px;color:var(--text3)">${c.package} · $${c.rateUsd}/mo · VA: ${c.assignedVa}</div></div>
        </div>
        <div style="text-align:right">
          <div style="font-size:16px;font-weight:700;color:${pct>=100?'var(--green)':pct>=50?'var(--gold-dark)':'var(--navy)'}">${pct}%</div>
          <div style="font-size:10px;color:var(--text3)">Step ${step} of ${OB_STEPS.length}</div>
        </div>
      </div>
      <div style="padding:12px 16px">
        <div class="prog-lg" style="margin-bottom:12px"><div class="prog-fill" style="width:${pct}%;background:${pct>=100?'var(--green)':pct>=50?'var(--gold)':'var(--teal)'}"></div></div>
        ${OB_STEPS.map((s,i)=>`
        <div class="ob-step">
          <div class="ob-step-icon ${i<step?'ob-done':'ob-pending'}">${i<step?'✓':i+1}</div>
          <div class="ob-step-name${i<step?' done':''}">${s}</div>

        </div>`).join('')}
      </div>
    </div>`;
  }).join('')||emptyState('No clients currently onboarding.')}`;
}

async function markOnboardingStep(clientId, newStep){
  const done = newStep>=OB_STEPS.length;
  await updateDoc('clients', clientId, {
    onboardingStep:newStep, onboardingDone:done,
    status: done?'Active':undefined,
    _actAction:'updated onboarding step', _actIcon:'📋', _actColor:'teal',
    _actRecord: APP.data.clients.find(c=>c.id===clientId)?.name||clientId
  });
  toast(done?'Client fully onboarded! Status changed to Active.':'Step marked complete!','success');
}

function selectVA(id){ APP.va.vaId=id; APP.va.pinEntry=''; renderCurrentPage(); }

function pinPress(k){
  if(k==='←'){ APP.va.pinEntry=APP.va.pinEntry.slice(0,-1); updatePinDots(); return; }
  if(k==='✓'||APP.va.pinEntry.length>=4){ checkPin(); return; }
  APP.va.pinEntry += k; updatePinDots();
  if(APP.va.pinEntry.length===4) setTimeout(checkPin,180);
}

function updatePinDots(){
  const filled=APP.va.pinEntry.length;
  [0,1,2,3].forEach(i=>{const d=document.getElementById('pd-'+i);if(d)d.className='pin-dot'+(i<filled?' filled':'');});
}

function checkPin(){
  const va = APP.data.team.find(v=>v.id===APP.va.vaId);
  if(APP.va.pinEntry===(va?.pin||'1234')){
    APP.va.loggedIn=true; APP.va.tab='dashboard'; renderCurrentPage();
    toast('Welcome back, '+va.displayName.split(' ')[0]+'! 👋','success');

    APP.va.pinEntry=''; renderCurrentPage();

  }
}

function renderClientPortal(){
  if(!APP.cp.clientId) return renderCPSelect();

}

          <div style="display:flex;align-items:center;gap:10px">
            <div class="dual-currency" style="text-align:right"><span class="dc-primary currency-usd" style="font-size:14px">$${c.rateUsd}</span><span class="dc-secondary">₱${FIN.toPhp(c.rateUsd).toLocaleString()}</span></div>

            <div style="text-align:center">${HEALTH.ring(h)}</div>

function filterCPClients(){
  const q=document.getElementById('cp-search').value.toLowerCase();
  document.querySelectorAll('#cp-list [data-name]').forEach(el=>{el.style.display=el.dataset.name.includes(q)?'':'none';});
}

function renderCPDetail(){
  const c = APP.data.clients.find(x=>x.id===APP.cp.clientId);
  if(!c){APP.cp.clientId=null;return renderCPSelect();}
  const h=HEALTH.compute(c);
  const margin=FIN.clientMargin(c);
  const ms=FIN.marginStatus(margin);
  const myTasks=APP.data.tasks.filter(t=>t.clientId===c.id&&!t.archived);
  const myInvs=APP.data.invoices.filter(i=>i.clientId===c.id&&!i.archived);
  const totalBilledUsd=myInvs.reduce((a,i)=>a+i.amountUsd,0);
  const totalPaidUsd=myInvs.filter(i=>i.status==='Paid').reduce((a,i)=>a+i.amountUsd,0);

  const tabs={
    overview:renderCPOverview(c,h,margin,ms,myTasks,myInvs,totalBilledUsd,totalPaidUsd),
    contacts:renderCPContacts(c),
    tasks:renderCPTasks(c,myTasks),
    finance:renderCPFinance(c,myInvs,totalBilledUsd,totalPaidUsd,margin),
    deliverables:renderCPDeliverables(c),
    reports:renderCPReports(c),
    notes:renderCPNotes(c),
    access:renderCPAccess(c),
  };

  return `
  <div style="max-width:960px;margin:0 auto">
    <div style="margin-bottom:14px"><button class="btn btn-sm btn-secondary" onclick="APP.cp.clientId=null;renderCurrentPage()">← All Clients</button></div>
    <div class="cp-hero">
      <div style="position:relative;z-index:1">
        <div style="font-size:11px;color:rgba(255,255,255,.55);margin-bottom:2px">${c.package} Package · ${c.assignedVa}</div>
        <div class="cp-hero-name">${c.name}</div>
        <div class="cp-hero-sub">$${c.rateUsd}/mo = ₱${FIN.toPhp(c.rateUsd).toLocaleString()}/mo · Contract: ${c.contractEnd||'Ongoing'}</div>
        <div class="cp-hero-tags">
          <span class="cp-hero-tag">${c.status}</span>
          <span class="cp-hero-tag">${c.priority} Priority</span>
          ${FIN.marginBadge(margin)}
          ${c.contractEnd&&new Date(c.contractEnd)<new Date(Date.now()+30*86400000)?`<span class="cp-hero-tag" style="background:rgba(201,168,76,.3)">⚠ Renewal Soon</span>`:''}
          ${c.oosCount?`<span class="oos-badge cp-hero-tag">${c.oosCount} OOS Tasks · $${c.oosValue||0} upsell</span>`:''}
        </div>
      </div>
      <div class="cp-hero-health">
        <div class="cp-hero-health-val">${h}</div>
        <div class="cp-hero-health-lbl">Health Score</div>
        ${HEALTH.riskTag(h)}
      </div>
    </div>
    <div class="cp-tabs" style="display:flex;border-bottom:1px solid var(--border);overflow-x:auto;margin-bottom:16px">
      ${[['overview','📊 Overview'],['contacts','👤 Contacts'],['tasks','✅ Tasks'],['finance','💰 Finance'],['deliverables','📦 Deliverables'],['reports','📈 Reports'],['notes','📝 Notes'],['access','🔑 Access']].map(([t,l])=>`<div class="cptab ptab${APP.cp.tab===t?' on':''}" onclick="APP.cp.tab='${t}';renderCurrentPage()">${l}</div>`).join('')}
    </div>
    <div>${tabs[APP.cp.tab]||''}</div>
  </div>`;
}

function renderCPOverview(c,h,margin,ms,myTasks,myInvs,totalBilledUsd,totalPaidUsd){
  const openTasks=myTasks.filter(t=>!t.done).length;
  const doneTasks=myTasks.filter(t=>t.done).length;
  const slaR=SLA.complianceRate(myTasks);
  const outstandingUsd=myInvs.filter(i=>['Sent','Overdue'].includes(i.status)).reduce((a,i)=>a+i.amountUsd,0);
  const oosTasks=myTasks.filter(t=>t.isOos);
  return `
  <div class="info-grid">
    <div class="info-box"><div class="info-label">Status</div><div class="info-val"><span class="tag ${statusTag(c.status)}">${c.status}</span></div></div>
    <div class="info-box"><div class="info-label">Monthly Revenue</div><div class="info-val currency-usd">$${c.rateUsd}/mo</div><div style="font-size:10px;color:var(--text3)">₱${FIN.toPhp(c.rateUsd).toLocaleString()}/mo</div></div>
    <div class="info-box"><div class="info-label">VA Cost</div><div class="info-val" style="color:var(--red)">₱${c.vaCostPhp.toLocaleString()}/mo</div></div>
    <div class="info-box"><div class="info-label">Margin</div><div class="info-val">${FIN.marginBadge(margin)}</div></div>
    <div class="info-box"><div class="info-label">Assigned VA</div><div class="info-val">${c.assignedVa}</div></div>
    <div class="info-box"><div class="info-label">Last Contact</div><div class="info-val">${c.lastContact||'—'}</div></div>
    <div class="info-box"><div class="info-label">Health Score</div><div class="info-val" style="color:${HEALTH.color(h)}">${h}/100 ${HEALTH.riskTag(h)}</div></div>
    <div class="info-box"><div class="info-label">SLA Rate</div><div class="info-val" style="color:${slaR>=90?'var(--green)':slaR>=75?'var(--gold-dark)':'var(--red)'}">${slaR}%</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--navy)">${openTasks}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Open Tasks</div></div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--green)">${doneTasks}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Tasks Done</div></div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--teal)">$${totalPaidUsd.toLocaleString()}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Total Paid</div></div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px;text-align:center"><div style="font-size:18px;font-weight:700;color:${outstandingUsd?'var(--red)':'var(--green)'}">$${outstandingUsd.toLocaleString()}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Outstanding</div></div>
  </div>
  ${oosTasks.length>0?`<div style="background:var(--purple-pale);border:1px solid rgba(83,64,183,.2);border-radius:var(--r);padding:10px 14px;margin-bottom:14px">
    <div style="font-size:12px;font-weight:600;color:var(--purple);margin-bottom:4px">🚫 Out-of-Scope Tasks (${oosTasks.length})</div>
    ${oosTasks.map(t=>`<div style="font-size:12px;color:var(--text2);margin-bottom:3px">• ${t.title}${t.oosValue?` — estimated $${t.oosValue} upsell`:''}</div>`).join('')}
    <div style="font-size:11px;color:var(--purple);margin-top:6px;font-weight:600">Upsell opportunity: $${c.oosValue||0} total</div>
  </div>`:''}
  <div class="form-group" style="margin-top:8px"><label class="form-label">Quick Status Update</label><div style="display:flex;gap:8px">
    <select class="form-control" id="cp-status-q">${['Lead','Proposal','Onboarding','Active','Completed','Archived'].map(s=>`<option${s===c.status?' selected':''}>${s}</option>`).join('')}</select>
    <button class="btn btn-primary" onclick="quickUpdateClientStatus('${c.id}')">Save</button>
  </div></div>`;

async function quickUpdateClientStatus(id){
  const s=document.getElementById('cp-status-q').value;
  await updateDoc('clients',id,{status:s,_actAction:'updated status to '+s,_actIcon:'✏️',_actColor:'navy',_actRecord:APP.data.clients.find(c=>c.id===id)?.name||id});
  toast('Client status updated!','success');
}

  if(!c.contacts) c.contacts=[];
  return `
  <div style="display:flex;justify-content:space-between;margin-bottom:12px">

    <button class="btn btn-sm btn-primary" onclick="openAddContact('${c.id}')">+ Add Contact</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px">
    ${c.contacts.map((ct,i)=>`<div class="card card-pad">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div class="av av-md av-navy">${(ct.name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div>

        <button class="btn-icon" style="margin-left:auto;opacity:.6" onclick="deleteContact('${c.id}',${i})">✕</button>
      </div>
    </div>`).join('')}
    ${c.contacts.length===0?emptyState('No contacts yet.'):''}

async function deleteContact(clientId,idx){
  const c=APP.data.clients.find(x=>x.id===clientId);
  if(!c||!c.contacts) return;
  c.contacts.splice(idx,1);
  await updateDoc('clients',clientId,{contacts:c.contacts,_actAction:'removed contact',_actIcon:'✏️',_actColor:'amber',_actRecord:c.name});
  toast('Contact removed.','warning');
}

async function saveTask(){
  const title=document.getElementById('f-task-title').value.trim();
  if(!title){toast('Please enter a task description.','error');return;}
  const ap=document.getElementById('f-task-assignee').value.split('|');
  const proj=document.getElementById('f-task-proj').value.split('|');
  const isOos=document.getElementById('f-task-oos').checked;
  const oosValue=isOos?parseInt(document.getElementById('f-task-oosval').value)||0:0;
  await addDoc('tasks',{
    title,done:false,priority:document.getElementById('f-task-priority').value,
    dueDate:document.getElementById('f-task-due').value,
    clientId:proj[0]||null,project:proj[1]||'',
    assigneeUid:ap[0],assigneeName:ap[1],assigneeInitials:ap[2],assigneeColor:ap[3],
    isOos,oosValue,archived:false,createdAt:ts(),firstResponseAt:null,
    _actAction:'created task',_actIcon:'✅',_actColor:'teal',_actRecord:title.slice(0,40)
  });
  // Update client OOS count if OOS
  if(isOos&&proj[0]){
    const c=APP.data.clients.find(x=>x.id===proj[0]);
    if(c) await updateDoc('clients',proj[0],{oosCount:(c.oosCount||0)+1,oosValue:(c.oosValue||0)+oosValue});
  }
  closeModal(); toast('Task added!','success');
}
