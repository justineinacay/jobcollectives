async function saveClient(){
  const name=document.getElementById('f-cl-name').value.trim();
  if(!name){toast('Please enter a client name.','error');return;}
  const rateUsd=parseInt(document.getElementById('f-cl-rate').value)||0;
  const vaCostPhp=parseInt(document.getElementById('f-cl-cost').value)||0;
  const va=document.getElementById('f-cl-va').value.split('|');
  const margin=rateUsd?FIN.clientMargin({rateUsd,vaCostPhp}):null;
  if(margin!==null&&margin<CFG.marginTarget){
    if(!confirm(`Warning: this client's margin is ${margin}%, below the ${CFG.marginTarget}% target. Add anyway?`)) return;
  }

/* ──────────────────────────────────────────────────────────
   SECTION 30 — TIMER (VA Portal)
────────────────────────────────────────────────────────── */
function startTimer(){
  if(APP.timer.running) return;
  APP.timer.running=true;
  APP.timer.start=Date.now()-APP.timer.elapsed*1000;
  APP.timer.iv=setInterval(()=>{
    APP.timer.elapsed=Math.floor((Date.now()-APP.timer.start)/1000);
    const el=document.getElementById('timer-display');
    if(el){
      const h=String(Math.floor(APP.timer.elapsed/3600)).padStart(2,'0');
      const m=String(Math.floor((APP.timer.elapsed%3600)/60)).padStart(2,'0');
      const s=String(APP.timer.elapsed%60).padStart(2,'0');
      el.textContent=`${h}:${m}:${s}`;
    }
  },1000);
  // Swap button visually without full re-render
  const btn=document.querySelector('.timer-btn-start');
  if(btn){btn.className='timer-btn-stop';btn.textContent='⏹ Stop & Log';btn.setAttribute('onclick','stopTimer()');}
}

function stopTimer(){
  clearInterval(APP.timer.iv); APP.timer.iv=null; APP.timer.running=false;
  toast('Timer stopped. Log your entry below.','info');
  // Re-render to show log form with pre-filled time
  renderCurrentPage();
}

function resetTimer(){
  clearInterval(APP.timer.iv); APP.timer.iv=null; APP.timer.running=false; APP.timer.elapsed=0;
  renderCurrentPage();
}

async function logTime(vaId){
  const desc=document.getElementById('timer-desc')?document.getElementById('timer-desc').value.trim():'';
  const manualEl=document.getElementById('timer-manual');
  const manual=manualEl?parseInt(manualEl.value)||0:0;
  const timerMins=Math.floor(APP.timer.elapsed/60);
  const minutes=manual||timerMins;
  if(!minutes||minutes<=0){toast('Run the timer or enter minutes manually.','error');return;}
  if(!desc){toast('Please describe what you worked on.','error');return;}
  const projEl=document.getElementById('timer-project');
  const projVal=projEl?projEl.value:'';
  const proj=projVal.split('|');
  const va=APP.data.team.find(v=>v.id===vaId);
  await addDoc('timelogs',{
    vaUid:vaId,vaName:va?.displayName||'',vaInitials:va?.initials||'',
    date:today(),description:desc,
    clientId:proj[0]||null,project:proj[1]||proj[0]||'',
    minutes,archived:false,
    _actAction:`logged ${Math.floor(minutes/60)}h ${minutes%60}m`,_actIcon:'⏱',_actColor:'navy',_actRecord:desc.slice(0,40)
  });
  resetTimer();
  toast(`Logged ${Math.floor(minutes/60)}h ${minutes%60}m — great work! 🎉`,'success');
}

/* ──────────────────────────────────────────────────────────
   SECTION 31 — HELPERS
────────────────────────────────────────────────────────── */
function tagHtml(priority){
  const m={Urgent:'t-red',High:'t-amber',Medium:'t-navy',Low:'t-gray'};
  return `<span class="tag ${m[priority]||'t-gray'}">${priority||'—'}</span>`;
}

function statusTag(s){
  const m={Lead:'t-navy',Proposal:'t-gold',Onboarding:'t-gold',Active:'t-teal',Completed:'t-green',Archived:'t-gray'};
  return m[s]||'t-gray';
}

function invoiceTag(s){
  const m={Draft:'t-navy',Sent:'t-teal',Paid:'t-green',Overdue:'t-red',Cancelled:'t-gray'};
  return m[s]||'t-gray';
}

function avColor(c){
  return {navy:'av-navy',teal:'av-teal',gold:'av-gold',red:'av-red',green:'av-green',purple:'av-purple'}[c]||'av-navy';
}

function today(){return new Date().toISOString().split('T')[0];}

function getWeekStart(){
  const d=new Date();d.setDate(d.getDate()-d.getDay());return d.toISOString().split('T')[0];
}

function emptyState(msg){
  return `<div class="empty"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><div class="empty-text">${msg}</div></div>`;
}

function taskRowHtml(t){
  const td=today(); const late=t.dueDate&&t.dueDate<td&&!t.done;
  return `<div class="task-row${late?' overdue-row':''}" onclick="openTaskDetail('${t.id}')">
    <div class="chk${t.done?' done':''}" onclick="event.stopPropagation();toggleTask('${t.id}')"></div>
    <span class="task-name${t.done?' done':''}">${t.isOos?`<span class="oos-badge">OOS</span> `:''}${t.title||'Untitled'}</span>
    <div class="task-meta">
      ${t.assigneeInitials?`<div class="av av-xs ${avColor(t.assigneeColor)}">${t.assigneeInitials}</div>`:''}
      <span style="font-size:10px;color:${late?'var(--red)':'var(--text3)'}">${late?'Overdue':t.dueDate||''}</span>
      ${tagHtml(t.priority)}
      ${SLA.badge(t)}
    </div>
  </div>`;
}

/* ──────────────────────────────────────────────────────────
   SECTION 32 — MODAL, TOAST, UI HELPERS
────────────────────────────────────────────────────────── */
function openModal(title,body,foot){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-foot').innerHTML=foot||'';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay')) closeModal();}

let toastTimer;
function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.className='toast',3500);
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('show');
}

function toggleSOP(i){
  const body=document.getElementById('sop-'+i);
  const arr=document.getElementById('sop-arr-'+i);
  if(!body) return;
  const open=body.style.display==='none'||!body.style.display;
  body.style.display=open?'block':'none';
  if(arr) arr.style.transform=open?'rotate(180deg)':'rotate(0deg)';
}

function confirmSignOut(){
  openModal('Reset Demo Data','<p style="font-size:13px;color:var(--text2);margin-bottom:12px">This resets all data back to the original sample data. All your changes will be lost.</p><p style="font-size:12px;color:var(--text3)">In production with Firebase, this button would sign you out of your account instead.</p>',
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="resetData()">Reset Data</button>`);
}

function resetData(){
  ['tasks','clients','timelogs','content','invoices','goals','team','events','activities','config'].forEach(col=>localStorage.removeItem(lsKey(col)));
  closeModal(); location.reload();
}
